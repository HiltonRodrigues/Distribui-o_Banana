<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doca — Forecast e Receção de Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg: #FAF7F2;
  --bg-panel: #FFFFFF;
  --ink: #1F2B22;
  --ink-soft: #5B6B5C;
  --line: #E3DCCF;
  --line-soft: #EEE8DC;
  --action: #3D5A40;
  --action-dark: #2C4330;
  --action-soft: #E7EEE3;
  --critical: #B5482E;
  --critical-soft: #F7E4DD;
  --warn: #C08A2E;
  --warn-soft: #F6EBD6;
  --ok: #4F7A52;
  --ok-soft: #E7F0E5;
  --gold: #C08A2E;
  --shadow: 0 1px 2px rgba(31,43,34,0.04), 0 4px 16px rgba(31,43,34,0.06);
  --radius: 10px;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--ink); font-family:var(--font-body); -webkit-font-smoothing:antialiased;}
body{min-height:100vh; display:flex;}

::selection{background:var(--action-soft); color:var(--action-dark);}

a{color:inherit;}

/* ---------- Layout shell ---------- */
.app{display:flex; width:100%; min-height:100vh;}

.sidebar{
  width:248px; flex-shrink:0;
  background:var(--action-dark);
  color:#F2EFE6;
  display:flex; flex-direction:column;
  padding:28px 18px;
  position:sticky; top:0; height:100vh;
}
.brand{
  font-family:var(--font-display);
  font-size:21px; font-weight:600;
  letter-spacing:0.01em;
  color:#fff;
  margin-bottom:2px;
  display:flex; align-items:baseline; gap:8px;
}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--gold); display:inline-block;}
.brand-sub{
  font-size:11.5px; color:#C7D2C3; letter-spacing:0.04em; text-transform:uppercase;
  margin-bottom:34px; padding-left:16px;
}
.nav{display:flex; flex-direction:column; gap:3px;}
.nav-item{
  display:flex; align-items:center; gap:11px;
  padding:11px 14px; border-radius:8px;
  font-size:14.5px; font-weight:500;
  color:#D7DECF; cursor:pointer;
  transition:background 0.15s ease, color 0.15s ease;
  border:none; background:none; text-align:left; width:100%;
  font-family:var(--font-body);
}
.nav-item:hover{background:rgba(255,255,255,0.07); color:#fff;}
.nav-item.active{background:#F2EFE6; color:var(--action-dark); font-weight:600;}
.nav-item .num{
  font-family:var(--font-mono); font-size:11px; opacity:0.6; width:16px;
}
.nav-item.active .num{opacity:0.45;}
.nav-divider{height:1px; background:rgba(255,255,255,0.12); margin:18px 4px;}

.sidebar-footer{margin-top:auto; padding-top:18px;}
.sidebar-footer .meta{font-size:11.5px; color:#9AAA94; line-height:1.6;}
.sidebar-footer button{
  margin-top:12px; width:100%; padding:9px 12px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14);
  border-radius:8px; color:#E7E2D4; font-size:12.5px; cursor:pointer;
  font-family:var(--font-body); transition:background 0.15s;
}
.sidebar-footer button:hover{background:rgba(255,255,255,0.12);}

.main{flex:1; min-width:0; padding:36px 44px 60px; max-width:1440px;}

/* ---------- Typography helpers ---------- */
.page-title{font-family:var(--font-display); font-size:30px; font-weight:600; color:var(--ink); letter-spacing:-0.01em;}
.page-sub{font-size:14px; color:var(--ink-soft); margin-top:5px; line-height:1.5;}
.eyebrow{font-size:11.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft);}

/* ---------- Dock / upload screen ---------- */
.dock-screen{
  min-height:100vh; width:100%;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 18% 15%, rgba(61,90,64,0.07), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(192,138,46,0.08), transparent 45%),
    var(--bg);
  padding:40px 24px;
}
.dock-card{
  max-width:760px; width:100%;
}
.dock-mark{
  display:flex; align-items:center; gap:10px; margin-bottom:28px; justify-content:center;
}
.dock-mark .dot{width:9px;height:9px;border-radius:50%;background:var(--action);}
.dock-mark span{font-family:var(--font-mono); font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-soft);}

.dock-title{
  font-family:var(--font-display); font-size:42px; font-weight:600;
  text-align:center; line-height:1.12; letter-spacing:-0.01em; color:var(--ink);
  margin-bottom:14px;
}
.dock-title em{font-style:italic; color:var(--action);}
.dock-desc{
  text-align:center; font-size:15px; color:var(--ink-soft); max-width:520px;
  margin:0 auto 40px; line-height:1.6;
}

.bays{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:28px;}
.bay{
  background:var(--bg-panel); border:1.5px dashed var(--line);
  border-radius:var(--radius); padding:28px 22px;
  text-align:center; cursor:pointer; position:relative;
  transition:border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
}
.bay:hover{border-color:var(--action); background:#FCFBF8; transform:translateY(-1px);}
.bay.filled{border-style:solid; border-color:var(--ok); background:var(--ok-soft);}
.bay.error{border-style:solid; border-color:var(--critical); background:var(--critical-soft);}
.bay input{display:none;}
.bay-icon{
  width:46px; height:46px; margin:0 auto 14px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  background:var(--action-soft); color:var(--action);
}
.bay.filled .bay-icon{background:var(--ok); color:#fff;}
.bay.error .bay-icon{background:var(--critical); color:#fff;}
.bay-label{font-weight:600; font-size:14.5px; margin-bottom:5px; color:var(--ink);}
.bay-desc{font-size:12.5px; color:var(--ink-soft); line-height:1.5;}
.bay-file{font-family:var(--font-mono); font-size:11.5px; color:var(--ok); margin-top:10px; word-break:break-all;}
.bay-error-msg{font-family:var(--font-mono); font-size:11px; color:var(--critical); margin-top:10px; line-height:1.5;}

.dock-cta{
  display:block; width:100%; padding:15px 0; border:none; border-radius:9px;
  background:var(--action); color:#fff; font-size:15px; font-weight:600;
  font-family:var(--font-body); cursor:pointer;
  transition:background 0.15s ease, opacity 0.15s ease;
}
.dock-cta:hover:not(:disabled){background:var(--action-dark);}
.dock-cta:disabled{background:#D8D2C4; color:#9C9586; cursor:not-allowed;}

.dock-cols{
  margin-top:30px; padding-top:24px; border-top:1px solid var(--line-soft);
  font-size:11.5px; color:var(--ink-soft); line-height:1.7; text-align:center;
}
.dock-cols b{color:var(--ink); font-weight:600;}
.dock-privacy{
  margin-top:16px; text-align:center; font-size:12px; color:var(--ink-soft);
  display:flex; align-items:center; justify-content:center; gap:6px;
}

/* ---------- Cards / generic panels ---------- */
.grid{display:grid; gap:16px;}
.kpi-grid{grid-template-columns:repeat(4, 1fr); margin:28px 0 32px;}
.kpi-card{
  background:var(--bg-panel); border:1px solid var(--line-soft); border-radius:var(--radius);
  padding:18px 20px; box-shadow:var(--shadow);
}
.kpi-label{font-size:11.5px; color:var(--ink-soft); font-weight:600; letter-spacing:0.03em; text-transform:uppercase;}
.kpi-value{font-family:var(--font-mono); font-size:28px; font-weight:600; color:var(--ink); margin-top:8px; letter-spacing:-0.01em;}
.kpi-value.critical{color:var(--critical);}
.kpi-value.action{color:var(--action);}
.kpi-foot{font-size:12px; color:var(--ink-soft); margin-top:4px;}

.panel{
  background:var(--bg-panel); border:1px solid var(--line-soft); border-radius:var(--radius);
  box-shadow:var(--shadow); margin-bottom:22px; overflow:hidden;
}
.panel-head{
  padding:18px 22px; border-bottom:1px solid var(--line-soft);
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.panel-title{font-family:var(--font-display); font-size:18px; font-weight:600;}
.panel-desc{font-size:12.5px; color:var(--ink-soft); margin-top:3px;}
.panel-body{padding:20px 22px;}

/* status chips */
.chip{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11.5px; font-weight:600; padding:4px 9px; border-radius:6px;
  letter-spacing:0.01em;
}
.chip-critical{background:var(--critical-soft); color:var(--critical);}
.chip-warn{background:var(--warn-soft); color:var(--warn);}
.chip-ok{background:var(--ok-soft); color:var(--ok);}
.chip-neutral{background:#EEEBE2; color:var(--ink-soft);}

/* table */
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{
  text-align:left; padding:9px 12px; font-size:11px; font-weight:600;
  color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em;
  border-bottom:1.5px solid var(--line); white-space:nowrap; background:var(--bg-panel);
  position:sticky; top:0;
}
thead th.num, td.num{text-align:right; font-family:var(--font-mono);}
th.sortable-th{cursor:pointer; user-select:none;}
th.sortable-th:hover{color:var(--ink);}
th.sortable-th.sorted{color:var(--action-dark);}
tbody td{padding:9px 12px; border-bottom:1px solid var(--line-soft); white-space:nowrap;}
tbody tr:hover{background:#FBF9F4;}
.row-loja{font-weight:600;}
.muted{color:var(--ink-soft);}

input.cell-input{
  width:54px; padding:4px 6px; border:1px solid var(--line); border-radius:5px;
  font-family:var(--font-mono); font-size:12.5px; text-align:center; color:var(--action-dark);
  background:#FBF9F1;
}
input.cell-input:focus{outline:2px solid var(--action); outline-offset:1px; border-color:var(--action);}
input.cell-input.edited{background:#FDF0DC; border-color:var(--gold); color:#8A5A12;}

/* search/filter bar */
.toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.search-input{
  padding:8px 12px; border:1px solid var(--line); border-radius:7px; font-size:13px;
  font-family:var(--font-body); min-width:220px; background:#fff;
}
.search-input:focus{outline:none; border-color:var(--action);}
.filter-btn{
  padding:7px 12px; border:1px solid var(--line); border-radius:7px; background:#fff;
  font-size:12.5px; font-weight:500; cursor:pointer; color:var(--ink-soft);
  font-family:var(--font-body); transition:all 0.15s;
}
.filter-btn.active{background:var(--action); color:#fff; border-color:var(--action);}
.filter-btn:hover:not(.active){border-color:var(--action);}

/* params */
.param-grid{display:grid; grid-template-columns:1fr; gap:18px; max-width:620px;}
.param-row{
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  padding:16px 0; border-bottom:1px solid var(--line-soft);
}
.param-row:last-child{border-bottom:none;}
.param-label{font-weight:600; font-size:14px;}
.param-note{font-size:12px; color:var(--ink-soft); margin-top:3px; max-width:380px; line-height:1.5;}
.param-control{display:flex; align-items:center; gap:8px; flex-shrink:0;}
.param-control input[type=number]{
  width:80px; padding:9px 10px; border:1.5px solid var(--action); border-radius:7px;
  font-family:var(--font-mono); font-size:15px; font-weight:600; text-align:center; color:var(--action-dark);
  background:#FBF9F1;
}
.param-control input:focus{outline:2px solid var(--action-soft); outline-offset:1px;}
.param-unit{font-size:12.5px; color:var(--ink-soft);}
.unit-toggle{display:flex; border:1.5px solid var(--line); border-radius:8px; overflow:hidden;}
.unit-btn{
  padding:9px 16px; border:none; background:#fff; font-size:13px; font-weight:600;
  color:var(--ink-soft); cursor:pointer; font-family:var(--font-body); transition:all 0.15s;
}
.unit-btn + .unit-btn{border-left:1.5px solid var(--line);}
.unit-btn.active{background:var(--action); color:#fff;}
.unit-btn:hover:not(.active){background:var(--action-soft);}

.banner{
  display:flex; align-items:flex-start; gap:12px;
  padding:13px 16px; border-radius:9px; margin-bottom:20px; font-size:13px; line-height:1.5;
}
.banner-action{background:var(--action-soft); color:var(--action-dark);}
.banner-warn{background:var(--warn-soft); color:#7A5A1E;}
.banner-critical{background:var(--critical-soft); color:#8C3522;}

.empty-state{
  text-align:center; padding:60px 20px; color:var(--ink-soft); font-size:14px;
}

.mobile-nav{display:none;}

@media (max-width: 980px){
  .sidebar{display:none;}
  .main{padding:18px 16px 50px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .bays{grid-template-columns:1fr;}
  .dock-title{font-size:32px;}
  .mobile-nav{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:14px; margin-bottom:6px;
    border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch;
  }
  .mobile-nav button{
    flex-shrink:0; padding:8px 14px; border-radius:20px; border:1px solid var(--line);
    background:#fff; font-size:13px; font-weight:500; color:var(--ink-soft);
    font-family:var(--font-body); cursor:pointer; white-space:nowrap;
  }
  .mobile-nav button.active{background:var(--action); color:#fff; border-color:var(--action);}
}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important; animation:none !important;}
}

@media print{
  body.printing-recepcao .sidebar, body.printing-forecast .sidebar,
  body.printing-recepcao .toolbar, body.printing-forecast .toolbar,
  body.printing-recepcao .mobile-nav, body.printing-forecast .mobile-nav,
  body.printing-recepcao .eyebrow, body.printing-forecast .eyebrow,
  body.printing-recepcao .page-sub, body.printing-forecast .page-sub{ display:none !important; }
  body.printing-recepcao .main, body.printing-forecast .main{ padding:0; max-width:none; }
  body.printing-recepcao .panel, body.printing-forecast .panel{ box-shadow:none; border:none; }
  body.printing-recepcao table, body.printing-forecast table{ font-size:10.5px; }
  body.printing-recepcao thead th, body.printing-forecast thead th{ position:static; }
  body.printing-recepcao .page-title, body.printing-forecast .page-title{ font-size:20px; margin-bottom:10px; }
  body.printing-recepcao .table-wrap, body.printing-forecast .table-wrap{ max-height:none !important; overflow:visible !important; }
  body *{ visibility:hidden; }
  body.printing-recepcao #recepcao-panel, body.printing-recepcao #recepcao-panel *,
  body.printing-forecast #forecast-panel, body.printing-forecast #forecast-panel *,
  body.printing-forecast #calendario-semanal-panel, body.printing-forecast #calendario-semanal-panel *,
  body.printing-recepcao .page-title, body.printing-forecast .page-title{ visibility:visible; }
  body.printing-recepcao .page-title, body.printing-forecast .page-title{ position:relative; }
  body.printing-recepcao #recepcao-panel{ position:absolute; left:0; top:60px; width:100%; }
  body.printing-forecast #forecast-panel{ position:relative; left:0; width:100%; margin-top:14px; }
  body.printing-forecast #calendario-semanal-panel{ position:relative; left:0; width:100%; margin-top:18px; page-break-before:always; }
  body.printing-forecast table{ font-size:7.5px; }
  body.printing-forecast input.cell-input{
    border:none; background:transparent; padding:0; width:auto; font-size:7.5px; color:inherit; text-align:right;
  }
  body.printing-forecast .panel{ overflow:visible; }
  body.printing-forecast table th, body.printing-forecast table td{ padding:3px 5px; }
}
</style>
</head>
<body>

<div id="root"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
// Valores padrão dos parâmetros — usados no arranque e no botão "Repor parâmetros padrão"
// da aba Parâmetros. nDiasTendencia fica null até haver histórico carregado (usa todo o histórico).
const DEFAULT_PARAMS = { coberturaAlvoGlobal: 5, horizonte: 7, nDiasTendencia: null, stockMinSeg: 0, unidadeMedida: 'UN', qtdPorCaixa: 1, diasEntregaCD: ['Seg','Qua','Sex'], maxCxDiaCalendario: null, maxExcedenteVendaSemanal: null, maxCxDiaDistribuicaoCD: null };

const STATE = {
  loaded: false,
  vendasRows: null,
  pivot: null,
  dateList: null,
  lojas: null,
  seasonalIdx: null,
  nomeLoja: {},
  params: { ...DEFAULT_PARAMS, diasEntregaCD: [...DEFAULT_PARAMS.diasEntregaCD] },
  coberturaPorLoja: {},
  stockOverride: {},
  // Stock construído a partir das distribuições GRAVADAS na aba "Distribuição por CD":
  // { loja: [ { qtd (unid. base), data 'YYYY-MM-DD', cd } ] } — acumula a cada gravação.
  stockGravado: {},
  // Histórico de gravações por CD (para feedback e para "Limpar gravações"):
  // { cd: [ { data ISO, totalCx, dia } ] }
  gravacoesPorCD: {},
  // Edições manuais da coluna "CX a Distribuir": { chave (cd ou cd__dia): { loja: cx } }
  distribuicaoEditada: {},
  cdMap: null,
  cdFilter: 'all',
  fileNamePlanning: null,
  fileErrorPlanning: null,
  fileWarningPlanning: null,
  cdMapSource: null,
  diasEntregaLoja: null,
  lojasHabilitadas: null,
  fileNameLojasHabilitadas: null,
  fileErrorLojasHabilitadas: null,
  qtdRecebidaPorCD: {},
  diaCDSelecionado: {},
  view: 'resumo',
  search: '',
  statusFilter: 'all',
  sortForecast: { field: null, dir: 'desc' },
  fileErrors: { vendas: null },
  fileNames: { vendas: null },
};

/* ============================================================
   PERSISTÊNCIA DAS GRAVAÇÕES
   1) SERVIDOR (partilhado): quando o site está alojado no Netlify
      com a função /api/gravacoes, as gravações são guardadas num
      estado único partilhado por TODOS os utilizadores — quem grava
      num computador, os outros veem.
   2) localStorage (local): cache/reserva neste browser, usada
      imediatamente no arranque e quando o servidor não está
      disponível (ex.: ficheiro aberto localmente).
   ============================================================ */
const STORAGE_KEY = 'doca_gravacoes_v1';
const API_GRAVACOES = '/api/gravacoes';
let SERVIDOR_GRAVACOES = null; // null = ainda não testado, true/false depois

function persistGravacoes(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      stockGravado: STATE.stockGravado,
      gravacoesPorCD: STATE.gravacoesPorCD,
    }));
  }catch(e){ /* sem persistência disponível — mantém só em memória */ }
}
function loadGravacoes(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj && typeof obj === 'object'){
      STATE.stockGravado = obj.stockGravado || {};
      STATE.gravacoesPorCD = obj.gravacoesPorCD || {};
    }
  }catch(e){ /* dados corrompidos ou storage indisponível — ignora */ }
}

// Aplica o estado devolvido pelo servidor e re-renderiza
function aplicarEstadoServidor(estado){
  STATE.stockGravado = (estado && estado.stockGravado) || {};
  STATE.gravacoesPorCD = (estado && estado.gravacoesPorCD) || {};
  persistGravacoes();
  if (STATE.loaded && STATE.results){ recalcAndRender(); } else { render(); }
}

// Vai buscar o estado partilhado ao servidor (no arranque e ao entrar no dashboard)
async function carregarGravacoesDoServidor(){
  try{
    const res = await fetch(API_GRAVACOES, { cache: 'no-store' });
    if (!res.ok) throw new Error('sem servidor');
    const estado = await res.json();
    SERVIDOR_GRAVACOES = true;
    aplicarEstadoServidor(estado);
  }catch(e){
    if (SERVIDOR_GRAVACOES === null){ SERVIDOR_GRAVACOES = false; if (!STATE.loaded) render(); }
  }
}

// Envia uma ação ao servidor (gravar / limpar). O servidor junta a ação ao estado
// partilhado e devolve o estado atualizado — que substitui o local (já inclui a
// nossa ação e as de outros utilizadores). Se falhar, fica só o registo local.
async function sincronizarAcao(payload){
  try{
    const res = await fetch(API_GRAVACOES, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('falha no servidor');
    const estado = await res.json();
    SERVIDOR_GRAVACOES = true;
    aplicarEstadoServidor(estado);
  }catch(e){
    SERVIDOR_GRAVACOES = false;
    if (STATE.loaded && STATE.results){ render(); }
  }
}

function totalGravacoesGuardadas(){
  return Object.values(STATE.gravacoesPorCD).reduce((s,arr)=>s+arr.length,0);
}
function limparTodasGravacoes(){
  STATE.stockGravado = {};
  STATE.gravacoesPorCD = {};
  persistGravacoes();
  sincronizarAcao({ action: 'limpar_tudo' });
  if (STATE.loaded){ recalcAndRender(); } else { render(); }
}

/* ============================================================
   SESSÃO GUARDADA (localStorage + servidor)
   Ao entrar no dashboard, os dados carregados (vendas, planning,
   lojas habilitadas e parâmetros) ficam guardados neste browser E
   são enviados ao servidor partilhado (/api/sessao). Na visita
   seguinte — em QUALQUER computador — a doca mostra um botão para
   ENTRAR SEM CARREGAR FICHEIROS, usando a sessão mais recente
   (a local ou a partilhada, a que for mais nova).
   ============================================================ */
const SESSAO_KEY = 'doca_sessao_v1';
const API_SESSAO = '/api/sessao';
let SESSAO_REMOTA = null;

function construirSessao(){
  const rows = (STATE.vendasRows || []).map(r => [dateKey(r.date), r.loja, r.vendasUN]);
  return {
    guardadaEm: new Date().toISOString(),
    fileNameVendas: STATE.fileNames.vendas || null,
    vendas: rows,
    cdMap: STATE.cdMap || null,
    cdMapSource: STATE.cdMapSource || null,
    nomeLoja: STATE.nomeLoja || {},
    diasEntregaLoja: STATE.diasEntregaLoja || null,
    lojasHabilitadas: STATE.lojasHabilitadas ? [...STATE.lojasHabilitadas] : null,
    params: STATE.params,
    coberturaPorLoja: STATE.coberturaPorLoja || {},
  };
}
function persistSessao(){
  const payload = construirSessao();
  try{
    localStorage.setItem(SESSAO_KEY, JSON.stringify(payload));
  }catch(e){ /* quota excedida ou storage indisponível */ }
  // envia ao servidor para ficar disponível em qualquer computador
  try{
    fetch(API_SESSAO, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(res => { if (res.ok) SESSAO_REMOTA = payload; }).catch(()=>{});
  }catch(e){}
}
function sessaoLocal(){
  try{
    const raw = localStorage.getItem(SESSAO_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || !Array.isArray(s.vendas) || s.vendas.length === 0) return null;
    return s;
  }catch(e){ return null; }
}
// Devolve a sessão mais recente entre a local (deste browser) e a partilhada (servidor)
function sessaoGuardada(){
  const l = sessaoLocal();
  const r = SESSAO_REMOTA;
  if (l && r) return (String(r.guardadaEm||'') > String(l.guardadaEm||'')) ? r : l;
  return l || r || null;
}
async function carregarSessaoDoServidor(){
  try{
    const res = await fetch(API_SESSAO, { cache: 'no-store' });
    if (!res.ok) return;
    const s = await res.json();
    if (s && Array.isArray(s.vendas) && s.vendas.length > 0){
      SESSAO_REMOTA = s;
      if (!STATE.loaded) render(); // mostra o botão "Entrar sem carregar ficheiros"
    }
  }catch(e){ /* servidor indisponível — fica só a sessão local */ }
}
function entrarComSessaoGuardada(){
  const s = sessaoGuardada();
  if (!s) return;
  STATE.vendasRows = s.vendas.map(([k, loja, v]) => ({ date: new Date(k + 'T00:00:00.000Z'), loja, vendasUN: Number(v) || 0 }));
  STATE.fileNames.vendas = s.fileNameVendas || 'dados da última sessão';
  STATE.fileErrors.vendas = null;
  STATE.cdMap = s.cdMap || null;
  STATE.cdMapSource = s.cdMapSource || null;
  STATE.nomeLoja = s.nomeLoja || {};
  STATE.diasEntregaLoja = s.diasEntregaLoja || null;
  STATE.lojasHabilitadas = s.lojasHabilitadas ? new Set(s.lojasHabilitadas) : null;
  // Os parâmetros da sessão só são usados se ainda não existirem AJUSTES guardados —
  // os ajustes (abaixo) são a fonte de verdade dos parâmetros e edições.
  if (s.params && AJUSTES_ULTIMO_JSON === null) STATE.params = { ...STATE.params, ...s.params, diasEntregaCD: [...(s.params.diasEntregaCD || STATE.params.diasEntregaCD)] };
  tryProcessAndEnter();
}

/* ============================================================
   AJUSTES PARTILHADOS (localStorage + servidor)
   Tudo o que o utilizador configura no dashboard fica guardado
   automaticamente a cada alteração e é partilhado com todos:
   - Parâmetros de Cálculo (unidade, qtd/caixa, cobertura, dias,
     limites, etc.)
   - Cobertura alvo e Stock editados por loja (Forecast e Receção)
   - "CX a Distribuir" editados, CX recebidas e dia selecionado
     por CD (Distribuição por CD)
   Ao abrir o site, aplica-se o mais recente entre o guardado
   neste browser e o guardado no servidor.
   ============================================================ */
const AJUSTES_KEY = 'doca_ajustes_v1';
const API_AJUSTES = '/api/ajustes';
let AJUSTES_PRONTO = false;       // já tentámos carregar (evita gravar por cima antes de ler)
let AJUSTES_ULTIMO_JSON = null;   // conteúdo do último ajuste guardado (evita envios repetidos)
let AJUSTES_TIMER = null;

function construirAjustes(){
  return {
    atualizadoEm: new Date().toISOString(),
    params: STATE.params,
    coberturaPorLoja: STATE.coberturaPorLoja || {},
    stockOverride: STATE.stockOverride || {},
    distribuicaoEditada: STATE.distribuicaoEditada || {},
    qtdRecebidaPorCD: STATE.qtdRecebidaPorCD || {},
    diaCDSelecionado: STATE.diaCDSelecionado || {},
  };
}
function serializarConteudoAjustes(a){
  return JSON.stringify([a.params, a.coberturaPorLoja, a.stockOverride, a.distribuicaoEditada, a.qtdRecebidaPorCD, a.diaCDSelecionado]);
}
function aplicarAjustes(a){
  if (!a || typeof a !== 'object') return;
  if (a.params) STATE.params = { ...STATE.params, ...a.params, diasEntregaCD: [...(a.params.diasEntregaCD || STATE.params.diasEntregaCD)] };
  STATE.coberturaPorLoja = a.coberturaPorLoja || {};
  STATE.stockOverride = a.stockOverride || {};
  STATE.distribuicaoEditada = a.distribuicaoEditada || {};
  STATE.qtdRecebidaPorCD = a.qtdRecebidaPorCD || {};
  STATE.diaCDSelecionado = a.diaCDSelecionado || {};
  AJUSTES_ULTIMO_JSON = serializarConteudoAjustes(a);
}
function ajustesLocais(){
  try{
    const raw = localStorage.getItem(AJUSTES_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function inicializarAjustes(){
  const local = ajustesLocais();
  let remoto = null;
  try{
    const res = await fetch(API_AJUSTES, { cache: 'no-store' });
    if (res.ok) remoto = await res.json();
  }catch(e){ /* servidor indisponível — usa só o local */ }
  const escolhido = (local && remoto)
    ? ((String(remoto.atualizadoEm||'') > String(local.atualizadoEm||'')) ? remoto : local)
    : (remoto || local);
  if (escolhido){
    aplicarAjustes(escolhido);
    if (STATE.loaded && STATE.results){ recalcAndRender(); } else { render(); }
  }
  AJUSTES_PRONTO = true;
}
// Chamado no fim de cada render(): se o conteúdo mudou, guarda localmente e
// envia ao servidor (com um pequeno atraso para agrupar alterações seguidas).
function agendarPersistAjustes(){
  if (!AJUSTES_PRONTO) return; // não gravar por cima antes de termos lido o estado guardado
  const a = construirAjustes();
  const s = serializarConteudoAjustes(a);
  if (s === AJUSTES_ULTIMO_JSON) return;
  AJUSTES_ULTIMO_JSON = s;
  try{ localStorage.setItem(AJUSTES_KEY, JSON.stringify(a)); }catch(e){}
  if (AJUSTES_TIMER) clearTimeout(AJUSTES_TIMER);
  AJUSTES_TIMER = setTimeout(()=>{
    try{
      fetch(API_AJUSTES, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(a),
      }).catch(()=>{});
    }catch(e){}
  }, 600);
}

/* ============================================================
   CALC ENGINE — replicado e validado contra o modelo Excel
   ============================================================ */
const DOW_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function excelSerialToDate(serial){
  const utc_days = Math.floor(serial - 25569);
  return new Date(utc_days * 86400 * 1000);
}
function dateKey(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const r = new Date(d); r.setUTCDate(r.getUTCDate()+n); return r; }
// Normaliza um código de loja para comparação entre ficheiros (Stock, Planning, Lojas
// Habilitadas): remove espaços nas pontas e uniformiza a capitalização. Sem isto, pequenas
// diferenças de formatação entre ficheiros (ex. "a026" vs "A026", ou espaços invisíveis vindos
// do Excel) fazem o cruzamento falhar silenciosamente — as lojas aparecem na lista mas perdem o
// Calendário Semanal de Entrega, o CD, ou ficam de fora do filtro de lojas habilitadas.
function normLoja(v){ return String(v==null?'':v).trim().toUpperCase(); }
function fmt1(v){ return (Math.round(v*10)/10).toLocaleString('pt-PT',{minimumFractionDigits:1,maximumFractionDigits:1}); }
function fmtInt(v){ return Math.round(v).toLocaleString('pt-PT'); }
function unidLabel(){ return STATE.params.unidadeMedida; }
function toCaixas(v){
  const qpc = STATE.params.qtdPorCaixa || 1;
  return Math.ceil((v - 1e-9) / qpc);
}
function fmtCx(v){
  if (v<=0) return '0';
  return Math.round(toCaixas(v)).toLocaleString('pt-PT');
}
// Igual a toCaixas, mas aplica o limite máximo de caixas/dia configurado para o
// Calendário Semanal de Entrega por Loja (STATE.params.maxCxDiaCalendario). Se o
// parâmetro não estiver definido (null/''), comporta-se exatamente como toCaixas.
function toCaixasCalendario(v){
  const cx = toCaixas(v);
  const max = STATE.params.maxCxDiaCalendario;
  if (max !== null && max !== undefined && max !== '' && !isNaN(max)){
    return Math.min(cx, max);
  }
  return cx;
}
// Calcula, para uma loja, as caixas sugeridas em cada dia da semana (índice 0=Seg..6=Dom)
// já aplicando os dois limites do Calendário Semanal de Entrega por Loja:
//  1) limite por dia (maxCxDiaCalendario) — aplicado célula a célula;
//  2) limite de excedente sobre a venda média semanal (maxExcedenteVendaSemanal) — o total da
//     semana nunca pode superar (Venda Méd. Semanal em CX) + este excedente. Se o total (já com
//     o limite diário aplicado) ultrapassar esse teto, o corte é distribuído a partir do último
//     dia de entrega da semana para o primeiro, sem deixar nenhum dia abaixo de 0.
// Devolve { porDia: [{idx, cxFinal, cxComLimiteDiario, atingiuLimiteDiario, atingiuLimiteSemanal}], total }
function computeCalendarioSemanalCx(x){
  const diasComInfo = [];
  DOW_SEMANA.forEach((d, idx) => {
    const info = x.calendarioSemanal[idx];
    if (!info) return;
    diasComInfo.push({ idx, info, cxComLimiteDiario: toCaixasCalendario(info.qtd) });
  });

  const totalComLimiteDiario = diasComInfo.reduce((s, d) => s + d.cxComLimiteDiario, 0);
  const maxExcedente = STATE.params.maxExcedenteVendaSemanal;
  // O limite de excedente sobre a venda média semanal não se aplica a lojas sem histórico de
  // vendas: nessas lojas mediaReal é 0, então o "limite" seria apenas o excedente configurado,
  // o que cortaria indevidamente o stock mínimo de segurança sem nenhuma venda para justificar.
  const temLimiteSemanal = !x.semHistorico && (maxExcedente !== null && maxExcedente !== undefined && maxExcedente !== '' && !isNaN(maxExcedente));
  const vendaMediaSemanalCx = toCaixas(x.mediaReal * 7);
  const limiteSemanal = vendaMediaSemanalCx + (temLimiteSemanal ? maxExcedente : Infinity);

  let excesso = temLimiteSemanal ? Math.max(0, totalComLimiteDiario - limiteSemanal) : 0;
  // distribui o corte do ultimo dia de entrega da semana para o primeiro
  const resultadosPorIdx = {};
  for (let i = diasComInfo.length - 1; i >= 0; i--){
    const d = diasComInfo[i];
    let cxFinal = d.cxComLimiteDiario;
    if (excesso > 0){
      const corte = Math.min(excesso, cxFinal);
      cxFinal -= corte;
      excesso -= corte;
    }
    resultadosPorIdx[d.idx] = {
      cxFinal,
      cxComLimiteDiario: d.cxComLimiteDiario,
      atingiuLimiteDiario: d.cxComLimiteDiario < toCaixas(d.info.qtd),
      atingiuLimiteSemanal: cxFinal < d.cxComLimiteDiario
    };
  }
  const totalFinal = Object.values(resultadosPorIdx).reduce((s,r)=>s+r.cxFinal,0);
  return { porIdx: resultadosPorIdx, total: totalFinal, limiteSemanal: temLimiteSemanal ? limiteSemanal : null, vendaMediaSemanalCx };
}
// Agrega, por CD, o total de caixas que o CD precisa de RECEBER DO FORNECEDOR em cada dia
// configurado em STATE.params.diasEntregaCD. Como a distribuição às lojas ocorre no dia seguinte
// (D+1) à receção do CD, a quantidade no dia X do CD é a soma das entregas às lojas no dia X+1
// (já com os limites diário e de excedente semanal aplicados, via computeCalendarioSemanalCx).
// Também agrega o forecast de vendas em unidade base (KG/UN), somando x.calendarioSemanal[idx].qtd
// de todas as lojas — sem arredondamento a caixa nem limites aplicados, é o forecast "puro".
// Lojas sem CD definido são agrupadas em '— Sem CD —'.
// Devolve um array ordenado: [{ cd, porDiaCD: {idxDiaCD: cx}, porDiaCDQtd: {idxDiaCD: qtd}, total, totalQtd, nLojas }]
function computeTotalCxPorCDEDia(rows){
  const lojasComCalendario = rows.filter(x => x.calendarioSemanal);
  const diasCD = STATE.params.diasEntregaCD || [];
  const idxDiasCD = diasCD.map(d => DOW_SEMANA.indexOf(d)).filter(i => i>=0);
  const porCD = {};
  lojasComCalendario.forEach(x => {
    const cd = x.cd || '— Sem CD —';
    if (!porCD[cd]) porCD[cd] = { cd, porDiaCD: {}, porDiaCDQtd: {}, total: 0, totalQtd: 0, nLojas: 0 };
    idxDiasCD.forEach(i => {
      if (porCD[cd].porDiaCD[i] === undefined) porCD[cd].porDiaCD[i] = 0;
      if (porCD[cd].porDiaCDQtd[i] === undefined) porCD[cd].porDiaCDQtd[i] = 0;
    });
    const calc = computeCalendarioSemanalCx(x);
    idxDiasCD.forEach(idxCD => {
      const idxEntregaLoja = (idxCD + 1) % 7; // D+1: dia em que a loja recebe a entrega
      const r = calc.porIdx[idxEntregaLoja];
      if (r) porCD[cd].porDiaCD[idxCD] += r.cxFinal;
      const info = x.calendarioSemanal[idxEntregaLoja];
      if (info) porCD[cd].porDiaCDQtd[idxCD] += info.qtd;
    });
    porCD[cd].total += calc.total;
    porCD[cd].totalQtd += DOW_SEMANA.reduce((s,d,idx) => s + (x.calendarioSemanal[idx] ? x.calendarioSemanal[idx].qtd : 0), 0);
    porCD[cd].nLojas += 1;
  });
  return Object.values(porCD).sort((a,b) => a.cd.localeCompare(b.cd, 'pt-PT'));
}

function parseVendasWorkbook(wb){
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
  const clean = [];
  for(const r of rows){
    let d = r['Date'];
    if (typeof d === 'number') d = excelSerialToDate(d);
    if (!(d instanceof Date) || isNaN(d.getTime())) continue;
    const loja = r['Loja'];
    if (!loja) continue;
    clean.push({ date:d, loja:normLoja(loja), vendasUN: Number(r['Vendas UN'])||0 });
  }
  if (clean.length === 0) throw new Error('Não foram encontradas linhas válidas com colunas "Date", "Loja" e "Vendas UN".');
  return clean;
}

function parsePlanningWorkbook(wb){
  // Prefere a sheet "Planning Mensal" (formato conhecido com colunas Lojas/CD); senao usa a primeira sheet
  const preferredNames = ['Planning Mensal', 'Planning', 'PlanningMensal'];
  let sheetName = wb.SheetNames.find(n => preferredNames.some(p => n.toLowerCase().trim() === p.toLowerCase()));
  if (!sheetName) sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
  if (rows.length === 0) throw new Error('Ficheiro de planning vazio.');

  // Procura colunas de codigo de loja e CD com tolerancia a variantes de nome
  const keys = Object.keys(rows.find(r => Object.values(r).some(v=>v!==null)) || rows[0]);
  const findKey = (candidates) => keys.find(k => candidates.some(c => k.toLowerCase().trim() === c.toLowerCase()));
  const lojaKey = findKey(['Lojas','Loja','Centro','Cód. Loja','Codigo Loja','Cod Loja','Numero Loja']);
  const cdKey = findKey(['CD','Centro de Distribuição','Centro Distribuição','Centro Distribuicao']);
  if (!lojaKey || !cdKey) {
    throw new Error(`Não foram encontradas as colunas de Loja e CD na aba "${sheetName}". Colunas disponíveis: ${keys.join(', ')}`);
  }

  // Coluna com o NOME da loja: procura primeiro colunas explícitas de nome; se não existirem,
  // aceita a coluna "Loja" desde que não seja a mesma coluna usada para o código (ex: ficheiros
  // com "Lojas" = código e "Loja" = nome). É esta coluna que alimenta o campo Nome nas abas
  // Receção Diária, Forecast e Receção e Distribuição por CD.
  const nomeKey = keys.find(k =>
    k !== lojaKey && k !== cdKey &&
    ['nome','nome loja','nome da loja','descrição','descricao','designação','designacao','loja']
      .some(c => k.toLowerCase().trim() === c)
  );

  // Procura o bloco "PLANO DE RECEÇÃO DOS PEDIDOS" — a 1a coluna desse bloco traz o cabecalho
  // "Segunda-feira" na 1a linha de dados, e as 6 colunas seguintes (na ordem em que aparecem no
  // ficheiro) sao Terca a Domingo. Identificamos a coluna inicial pelo nome e usamos a ordem das
  // colunas no array `keys` para encontrar as 6 seguintes, sem depender dos nomes __EMPTY_N do XLSX.
  const planoKeyCandidates = ['PLANO DE RECEÇÃO DOS PEDIDOS','PLANO DE RECEPÇÃO DOS PEDIDOS','PLANO DE RECECAO DOS PEDIDOS'];
  const planoStartKey = findKey(planoKeyCandidates);
  let diasKeysOrdered = null;
  if (planoStartKey){
    const startIdx = keys.indexOf(planoStartKey);
    diasKeysOrdered = keys.slice(startIdx, startIdx+7); // Seg,Ter,Qua,Qui,Sex,Sab,Dom
  }
  const DOW_FULL_ORDER = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

  const map = {};
  const diasEntregaLoja = {};
  const nomeLoja = {};
  for(const r of rows){
    const loja = r[lojaKey];
    const cd = r[cdKey];
    if (!loja || !cd) continue;
    if (typeof cd === 'number') continue; // valores invalidos tipo 0 nas linhas de cabecalho/total
    const lojaStr = normLoja(loja);
    const cdStr = String(cd).trim();
    if (!lojaStr || !cdStr) continue;
    map[lojaStr] = cdStr;

    if (nomeKey){
      const nome = r[nomeKey];
      if (nome !== null && String(nome).trim() !== '') nomeLoja[lojaStr] = String(nome).trim();
    }

    if (diasKeysOrdered){
      const dias = [];
      diasKeysOrdered.forEach((k, i) => {
        const v = r[k];
        if (v !== null && String(v).trim() !== '') dias.push(DOW_FULL_ORDER[i]);
      });
      if (dias.length > 0) diasEntregaLoja[lojaStr] = dias;
    }
  }
  if (Object.keys(map).length === 0) throw new Error('Não foram encontradas linhas válidas com Loja e CD preenchidos.');
  return { map, diasEntregaLoja, nomeLoja };
}

function parseLojasHabilitadasWorkbook(wb){
  // Procura a sheet com colunas Centro (codigo loja) + CD; tenta todas as sheets do ficheiro
  // ate encontrar uma com as colunas certas (ex: "Folha3" no ficheiro de exemplo).
  let found = null;
  for (const sheetName of wb.SheetNames){
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
    if (rows.length === 0) continue;
    const firstNonEmpty = rows.find(r => Object.values(r).some(v=>v!==null)) || rows[0];
    const keys = Object.keys(firstNonEmpty);
    const findKey = (candidates) => keys.find(k => candidates.some(c => k.toLowerCase().trim() === c.toLowerCase()));
    const lojaKey = findKey(['Centro','Loja','Lojas','Cód. Loja','Codigo Loja','Cod Loja','Numero Loja']);
    const cdKey = findKey(['CD','Centro de Distribuição','Centro Distribuição','Centro Distribuicao']);
    if (lojaKey){
      found = { rows, lojaKey, cdKey };
      break;
    }
  }
  if (!found) throw new Error('Não foi encontrada nenhuma aba com uma coluna de código de loja (ex: "Centro" ou "Loja").');

  const lojasSet = new Set();
  const cdMapExtra = {};
  for (const r of found.rows){
    const loja = r[found.lojaKey];
    if (!loja) continue;
    if (typeof loja === 'number') continue; // ignora linhas de total/cabecalho residuais
    const lojaStr = normLoja(loja);
    if (!lojaStr) continue;
    lojasSet.add(lojaStr);
    if (found.cdKey){
      const cd = r[found.cdKey];
      if (cd && typeof cd !== 'number'){
        const cdStr = String(cd).trim();
        if (cdStr) cdMapExtra[lojaStr] = cdStr;
      }
    }
  }
  if (lojasSet.size === 0) throw new Error('Não foram encontradas lojas válidas no ficheiro.');
  return { lojasSet, cdMapExtra };
}

function buildPivot(vendasRows){
  const dateSet = [...new Set(vendasRows.map(r=>dateKey(r.date)))].sort();
  const lojas = [...new Set(vendasRows.map(r=>r.loja))].sort();
  const dateList = dateSet.map(s=>new Date(s+'T00:00:00.000Z'));
  const dateIdx = {}; dateSet.forEach((d,i)=>dateIdx[d]=i);
  const pivot = {};
  for(const l of lojas) pivot[l] = new Array(dateList.length).fill(0);
  for(const r of vendasRows){
    pivot[r.loja][dateIdx[dateKey(r.date)]] += r.vendasUN;
  }
  return { pivot, dateList, lojas };
}

function computeSeasonalIndex(pivot, dateList, lojas){
  const totalPerDay = dateList.map((_,i)=> lojas.reduce((s,l)=>s+pivot[l][i],0));
  const dows = dateList.map(d=>d.getUTCDay());
  const sums = new Array(7).fill(0), counts = new Array(7).fill(0);
  totalPerDay.forEach((v,i)=>{ sums[dows[i]]+=v; counts[dows[i]]++; });
  const avgByDow = sums.map((s,i)=> counts[i] ? s/counts[i] : 0);
  const validAvgs = avgByDow.filter((_,i)=>counts[i]>0);
  const overallAvg = validAvgs.reduce((a,b)=>a+b,0) / validAvgs.length;
  return avgByDow.map(v => overallAvg>0 ? v/overallAvg : 1);
}

function linregress(x,y){
  const n=x.length;
  const sumX=x.reduce((a,b)=>a+b,0), sumY=y.reduce((a,b)=>a+b,0);
  const sumXY=x.reduce((a,b,i)=>a+b*y[i],0), sumXX=x.reduce((a,b)=>a+b*b,0);
  const denom=(n*sumXX - sumX*sumX);
  if (denom===0) return { slope:0, intercept: n? sumY/n : 0 };
  const slope=(n*sumXY - sumX*sumY)/denom;
  const intercept=(sumY - slope*sumX)/n;
  return { slope, intercept };
}

function computeForecastForLoja(serie, dateList, seasonalIdx, nDiasTendencia, horizonteMax){
  const n = serie.length;
  const nUse = Math.min(nDiasTendencia, n);
  const start = n - nUse;
  const ySlice = serie.slice(start);
  const xSlice = ySlice.map((_,i)=>i+1);
  const deseason = ySlice.map((v,i)=>{
    const dow = dateList[start+i].getUTCDay();
    const f = seasonalIdx[dow] || 1;
    return v/f;
  });
  const { slope, intercept } = linregress(xSlice, deseason);
  const lastDate = dateList[n-1];
  const forecast = [];
  for(let t=1; t<=horizonteMax; t++){
    const xFut = xSlice.length + t;
    let nivel = intercept + slope*xFut;
    if (nivel<0) nivel = 0;
    const futDate = addDays(lastDate, t);
    const f = seasonalIdx[futDate.getUTCDay()] || 1;
    forecast.push(Math.round(nivel*f*10)/10);
  }
  const mediaReal = ySlice.reduce((a,b)=>a+b,0) / ySlice.length;
  return { slope, intercept, forecast, mediaReal };
}

/* ============================================================
   CALENDÁRIO SEMANAL DE ENTREGA POR DIA DA SEMANA (com base no
   Planning de Entrega): cada entrega de uma loja cobre o forecast
   de vendas desde esse dia até ao dia anterior à entrega seguinte
   da mesma loja, de forma cíclica numa semana de 7 dias.
   ============================================================ */
const DOW_SEMANA = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom']; // ordem natural da semana, Seg=0

function computeCalendarioEntregaSemanal(forecast14, lastDate, diasEntregaLoja, qtdMinimaSemHistorico){
  // diasEntregaLoja: array de strings ('Seg','Ter',...) — dias em que esta loja recebe entrega
  if (!diasEntregaLoja || diasEntregaLoja.length === 0) return null;

  // indices (0..6, Seg=0) dos dias de entrega, ordenados
  const idxEntrega = diasEntregaLoja
    .map(d => DOW_SEMANA.indexOf(d))
    .filter(i => i>=0)
    .sort((a,b)=>a-b);
  if (idxEntrega.length === 0) return null;

  // Loja sem histórico de vendas: não há forecast para repartir (todos os dias dariam 0 CX), por
  // isso sugerimos o Stock Mínimo de Segurança integral em CADA dia de entrega da loja (não
  // dividido entre eles) — cada entrega garante, por si só, o mínimo definido nos parâmetros.
  if (qtdMinimaSemHistorico !== undefined && qtdMinimaSemHistorico !== null && qtdMinimaSemHistorico > 0){
    const resultado = {};
    idxEntrega.forEach(idx => { resultado[idx] = { diasCobertos: [idx], qtd: qtdMinimaSemHistorico }; });
    return resultado;
  }

  // mapa: para cada um dos 7 dias futuros (a partir de lastDate+1), qual o indice de semana (0..6) e o forecast desse dia
  const futDays = [];
  for (let t=1; t<=7; t++){
    const d = addDays(lastDate, t);
    const dowJs = d.getUTCDay(); // 0=Dom..6=Sab
    const idxSemana = (dowJs + 6) % 7; // converte para Seg=0..Dom=6
    futDays.push({ date:d, idxSemana, forecast: forecast14[t-1] });
  }

  // Para cada dia de entrega, soma o forecast dos dias deste at\u00e9 ao dia anterior \u00e0 proxima entrega
  // (ciclicamente: se a ultima entrega da semana for Sex, e a primeira for Seg, Sex cobre Sex,Sab,Dom)
  const resultado = {}; // idxSemana de entrega -> { dows_cobertos: [...], qtd: number }
  const nEntregas = idxEntrega.length;
  for (let e=0; e<nEntregas; e++){
    const diaAtual = idxEntrega[e];
    const proximaEntrega = idxEntrega[(e+1) % nEntregas];
    // quantidade de dias cobertos (ciclicamente) desde diaAtual até proximaEntrega-1
    let span = proximaEntrega - diaAtual;
    if (span <= 0) span += 7; // wrap around da semana
    const diasCobertos = [];
    let soma = 0;
    for (let k=0; k<span; k++){
      const idx = (diaAtual + k) % 7;
      diasCobertos.push(idx);
      const futDay = futDays.find(f => f.idxSemana === idx);
      if (futDay) soma += futDay.forecast;
    }
    resultado[diaAtual] = { diasCobertos, qtd: Math.round(soma*10)/10 };
  }
  return resultado; // { idxSemanaEntrega: { diasCobertos:[...], qtd } }
}

/* ============================================================
   DISTRIBUIÇÃO DIÁRIA ALINHADA A DATAS CONCRETAS, RESPEITANDO OS
   DIAS DE ENTREGA DE CADA LOJA (Planning). Usado na Receção Diária:
   para cada data futura concreta, se a loja não tem entrega nesse
   dia da semana, a celula fica null (S/E). Se tem entrega, o peso
   relativo de cada periodo de entrega vem do forecast acumulado
   desse periodo, mas o valor final é escalado para que a soma de
   todas as entregas no horizonte seja exatamente igual ao
   "Total a Receber" (qtdReceberHoje) já calculado para a loja —
   mantém a tabela coerente com a coluna de totais.
   ============================================================ */
function computeDistribuicaoDiariaComPlanning(forecast14, lastDate, diasEntregaLoja, nDiasExibir, qtdReceberHoje, qtdMinimaSemHistorico){
  if (!diasEntregaLoja || diasEntregaLoja.length === 0) return null;
  const idxEntregaSet = new Set(diasEntregaLoja.map(d => DOW_SEMANA.indexOf(d)).filter(i=>i>=0));
  if (idxEntregaSet.size === 0) return null;

  // gera array de {date, idxSemana, forecast} para uma janela ampla (horizonte exibido + 7 dias de
  // margem, para conseguir encontrar a "proxima entrega" mesmo que caia fora da janela visivel)
  const janela = [];
  const margem = 7;
  for (let t=1; t<=nDiasExibir+margem; t++){
    const d = addDays(lastDate, t);
    const dowJs = d.getUTCDay();
    const idxSemana = (dowJs + 6) % 7;
    const fc = (t-1 < forecast14.length) ? forecast14[t-1] : forecast14[forecast14.length-1];
    janela.push({ date:d, idxSemana, forecast: fc });
  }

  const isEntrega = new Array(nDiasExibir).fill(false);
  for (let t=0; t<nDiasExibir; t++){
    if (idxEntregaSet.has(janela[t].idxSemana)) isEntrega[t] = true;
  }

  // Loja sem histórico de vendas: não há forecast para repartir, por isso sugerimos o Stock
  // Mínimo de Segurança integral em CADA dia de entrega (mesma regra usada no Calendário Semanal
  // de Entrega por Loja) — em vez de ratear qtdReceberHoje pelos dias do horizonte.
  if (qtdMinimaSemHistorico !== undefined && qtdMinimaSemHistorico !== null && qtdMinimaSemHistorico > 0){
    const resultado = [];
    for (let t=0; t<nDiasExibir; t++){
      resultado.push(isEntrega[t] ? qtdMinimaSemHistorico : null);
    }
    return resultado;
  }

  // peso bruto de cada dia de entrega (forecast acumulado do periodo que cobre)
  const pesos = new Array(nDiasExibir).fill(0);
  for (let t=0; t<nDiasExibir; t++){
    if (!isEntrega[t]) continue;
    let soma = janela[t].forecast;
    for (let k=t+1; k<janela.length; k++){
      if (idxEntregaSet.has(janela[k].idxSemana)) break;
      soma += janela[k].forecast;
    }
    pesos[t] = soma;
  }

  const totalPesos = pesos.reduce((a,b)=>a+b,0);
  const nEntregasNoHorizonte = isEntrega.filter(Boolean).length;
  const resultado = [];
  for (let t=0; t<nDiasExibir; t++){
    if (!isEntrega[t]){ resultado.push(null); continue; }
    const valor = totalPesos>0
      ? qtdReceberHoje * (pesos[t]/totalPesos)
      : (nEntregasNoHorizonte>0 ? qtdReceberHoje/nEntregasNoHorizonte : 0);
    resultado.push(Math.round(valor*10)/10);
  }
  return resultado;
}

/* ============================================================
   STOCK A PARTIR DAS DISTRIBUIÇÕES GRAVADAS (Distribuição por CD)
   Cada gravação acumula a quantidade distribuída à loja na data em
   que foi gravada. O stock efetivo é simulado dia a dia: soma as
   quantidades gravadas e desconta a venda prevista dos dias
   SEGUINTES a cada gravação, até ao dia de hoje (nunca abaixo de 0).
   ============================================================ */
// Venda a descontar numa data concreta, por ordem de preferência:
//  1) VENDA REAL — se a data existir no histórico de vendas carregado, usa a venda efetiva da
//     loja nesse dia. É isto que permite carregar um ficheiro de vendas atualizado e abater o
//     stock gravado com as vendas reais, sem recomeçar do zero.
//  2) FORECAST — se a data for futura face ao histórico, usa o forecast diário da loja.
//  3) MÉDIA — fora da janela de forecast, usa a venda média diária como aproximação.
function vendaNoDia(loja, d, lastDate, forecast, mediaReal){
  const k = dateKey(d);
  if (STATE.dateIdxMap && (k in STATE.dateIdxMap) && STATE.pivot && STATE.pivot[loja]){
    return Math.max(0, STATE.pivot[loja][STATE.dateIdxMap[k]]);
  }
  const t = Math.round((d.getTime() - lastDate.getTime()) / 86400000);
  if (t >= 1 && t <= forecast.length) return forecast[t-1];
  return Math.max(0, mediaReal);
}

function stockGravadoEfetivo(loja, lastDate, forecast, mediaReal){
  const entradas = STATE.stockGravado[loja];
  if (!entradas || entradas.length === 0) return 0;
  // agrega as gravações por data
  const porDia = {};
  entradas.forEach(e => { porDia[e.data] = (porDia[e.data] || 0) + e.qtd; });
  const dias = Object.keys(porDia).sort();
  const primeiro = new Date(dias[0] + 'T00:00:00.000Z');
  const hoje = new Date(dateKey(new Date()) + 'T00:00:00.000Z');
  let stock = 0;
  let d = primeiro;
  let ehPrimeiroDia = true;
  while (d <= hoje){
    // desconta a venda prevista dos dias SEGUINTES à primeira gravação (o dia da própria
    // gravação não é descontado — só os dias que se seguem)
    if (!ehPrimeiroDia){
      stock = Math.max(0, stock - vendaNoDia(loja, d, lastDate, forecast, mediaReal));
    }
    const k = dateKey(d);
    if (porDia[k]) stock += porDia[k];
    ehPrimeiroDia = false;
    d = addDays(d, 1);
  }
  return Math.round(stock * 10) / 10;
}

function computeAll(){
  const { pivot, dateList, lojas } = buildPivot(STATE.vendasRows);
  STATE.pivot = pivot; STATE.dateList = dateList; STATE.lojas = lojas;
  // mapa data->índice para consultar rapidamente a venda REAL de um dia no histórico carregado
  const dateIdxMap = {};
  dateList.forEach((d,i)=>{ dateIdxMap[dateKey(d)] = i; });
  STATE.dateIdxMap = dateIdxMap;
  STATE.seasonalIdx = computeSeasonalIndex(pivot, dateList, lojas);
  if (STATE.params.nDiasTendencia === null) STATE.params.nDiasTendencia = dateList.length;

  // Lojas consideradas: todas as que têm histórico de vendas carregado (o ficheiro de stock
  // deixou de existir — o stock atual passa a ser construído pelas distribuições gravadas).
  let allLojaCodes = lojas.slice().sort();

  // Se houver uma lista de lojas habilitadas a receber o artigo, restringe a essas lojas — mas
  // sem perder lojas habilitadas que ainda não têm histórico de vendas (ex: lojas novas). Essas
  // entram com stock 0 e são tratadas como "sem histórico", recebendo o stock mínimo de
  // segurança nos seus dias de entrega.
  if (STATE.lojasHabilitadas){
    allLojaCodes = allLojaCodes.filter(l => STATE.lojasHabilitadas.has(l));
    const lojasSoHabilitadas = [...STATE.lojasHabilitadas].filter(l => !pivot[l]);
    allLojaCodes = [...new Set([...allLojaCodes, ...lojasSoHabilitadas])].sort();
  }

  const lastDateVendas = dateList[dateList.length-1];
  const results = [];
  for(const loja of allLojaCodes){
    const nome = STATE.nomeLoja[loja] || loja;
    const serie = pivot[loja] || new Array(dateList.length).fill(0);
    const semHistorico = !(loja in pivot) || serie.every(v=>v===0);

    const { slope, intercept, forecast, mediaReal } = computeForecastForLoja(
      serie, dateList, STATE.seasonalIdx, STATE.params.nDiasTendencia, 14
    );

    // Stock atual = acumulado das distribuições gravadas na aba "Distribuição por CD",
    // descontando a venda prevista dos dias seguintes a cada gravação. A edição manual na
    // tabela "Forecast e Receção" (stockOverride) continua a sobrepor-se a este valor.
    const stockBase = stockGravadoEfetivo(loja, lastDateVendas, forecast, mediaReal);
    const stockAtual = (loja in STATE.stockOverride) ? Math.max(0, STATE.stockOverride[loja]) : stockBase;
    const stockEditado = (loja in STATE.stockOverride);

    const coberturaAlvo = STATE.coberturaPorLoja[loja] ?? STATE.params.coberturaAlvoGlobal;
    const coberturaAtual = mediaReal>0 ? stockAtual/mediaReal : null;
    const forecastHorizonte = forecast.slice(0, STATE.params.horizonte).reduce((a,b)=>a+b,0);
    const stockNecessario = forecast.slice(0, coberturaAlvo).reduce((a,b)=>a+b,0);

    let qtdReceberHoje;
    if (semHistorico){
      // Sem histórico de vendas: garantimos pelo menos o stock mínimo de segurança definido nos parâmetros.
      qtdReceberHoje = Math.max(0, STATE.params.stockMinSeg - stockAtual);
    } else {
      qtdReceberHoje = Math.max(0, stockNecessario + STATE.params.stockMinSeg - stockAtual);
    }

    // Status de urgência: baseado na proporção entre o que falta receber e o que é necessário
    // para a cobertura alvo — não depende da "Cobertura Atual" (stock atual ÷ venda média).
    const necessarioTotal = stockNecessario + STATE.params.stockMinSeg;
    const faltaProporcao = necessarioTotal>0 ? qtdReceberHoje/necessarioTotal : 0;
    let status;
    if (semHistorico) status = 'sem_historico';
    else if (faltaProporcao >= 0.5) status = 'critico';
    else if (faltaProporcao > 0) status = 'abaixo';
    else status = 'ok';

    const forecastH = forecast.slice(0, STATE.params.horizonte);
    const somaForecastH = forecastH.reduce((a,b)=>a+b,0);
    const distribuicaoDiaria = forecastH.map(f=>{
      if (somaForecastH<=0) return Math.round((qtdReceberHoje/STATE.params.horizonte)*10)/10;
      return Math.round(qtdReceberHoje * f / somaForecastH * 10)/10;
    });

    const stockNegativo = false; // sem ficheiro de stock, não há valores negativos vindos do SAP

    const diasEntrega = (STATE.diasEntregaLoja && STATE.diasEntregaLoja[loja]) ? STATE.diasEntregaLoja[loja] : null;
    const qtdMinimaSemHistorico = semHistorico ? STATE.params.stockMinSeg : null;
    const calendarioSemanal = diasEntrega ? computeCalendarioEntregaSemanal(forecast, dateList[dateList.length-1], diasEntrega, qtdMinimaSemHistorico) : null;
    const distribuicaoDiariaPlanning = diasEntrega
      ? computeDistribuicaoDiariaComPlanning(forecast, dateList[dateList.length-1], diasEntrega, STATE.params.horizonte, qtdReceberHoje, qtdMinimaSemHistorico)
      : null;

    results.push({
      loja, nome, stockAtual, stockBruto: stockBase, mediaReal, coberturaAlvo,
      slope, intercept, forecast, forecastDia1: forecast[0], coberturaAtual, status,
      forecastHorizonte, stockNecessario, qtdReceberHoje, distribuicaoDiaria, distribuicaoDiariaPlanning,
      semHistorico, stockNegativo, temStock: true, stockEditado,
      cd: (STATE.cdMap && STATE.cdMap[loja]) ? STATE.cdMap[loja] : null,
      diasEntrega, calendarioSemanal,
    });
  }
  return results;
}

/* ============================================================
   FILE LOADING
   ============================================================ */
function readFileAsWorkbook(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array', cellDates:true});
        resolve(wb);
      } catch(err){ reject(err); }
    };
    reader.onerror = ()=> reject(new Error('Não foi possível ler o ficheiro.'));
    reader.readAsArrayBuffer(file);
  });
}

async function handleFileSelect(kind, file){
  if (!file) return;
  if (kind === 'planning'){
    STATE.fileErrorPlanning = null;
    STATE.fileWarningPlanning = null;
    STATE.fileNamePlanning = file.name;
    try{
      const wb = await readFileAsWorkbook(file);
      const { map, diasEntregaLoja, nomeLoja } = parsePlanningWorkbook(wb);
      STATE.cdMap = map;
      STATE.cdMapSource = 'planning';
      STATE.nomeLoja = nomeLoja || {};
      STATE.diasEntregaLoja = (diasEntregaLoja && Object.keys(diasEntregaLoja).length>0) ? diasEntregaLoja : null;
      if (!STATE.diasEntregaLoja){
        STATE.fileWarningPlanning = 'CD mapeado, mas não foi encontrado o bloco "PLANO DE RECEÇÃO DOS PEDIDOS" com os dias de entrega — o Calendário Semanal de Entrega por Loja e o Total por CD não vão aparecer. Confirme se o ficheiro tem esse bloco com 7 colunas (Seg a Dom).';
      }
    } catch(err){
      STATE.fileErrorPlanning = err.message || 'Ficheiro inválido.';
      if (STATE.cdMapSource === 'planning'){ STATE.cdMap = null; STATE.cdMapSource = null; }
      STATE.diasEntregaLoja = null;
      STATE.nomeLoja = {};
    }
    render();
    return;
  }
  if (kind === 'lojasHabilitadas'){
    STATE.fileErrorLojasHabilitadas = null;
    STATE.fileNameLojasHabilitadas = file.name;
    try{
      const wb = await readFileAsWorkbook(file);
      const { lojasSet, cdMapExtra } = parseLojasHabilitadasWorkbook(wb);
      STATE.lojasHabilitadas = lojasSet;
      // Se ainda nao houver mapeamento de CD carregado via planning, usa o deste ficheiro como fallback
      // (bonus: este ficheiro tambem costuma ter CD), mas sem marcar a baia de Planning como concluida.
      if ((!STATE.cdMap || STATE.cdMapSource === 'habilitadas') && Object.keys(cdMapExtra).length>0){
        STATE.cdMap = cdMapExtra;
        STATE.cdMapSource = 'habilitadas';
      }
    } catch(err){
      STATE.fileErrorLojasHabilitadas = err.message || 'Ficheiro inválido.';
      STATE.lojasHabilitadas = null;
    }
    render();
    return;
  }
  STATE.fileErrors[kind] = null;
  STATE.fileNames[kind] = file.name;
  try{
    const wb = await readFileAsWorkbook(file);
    if (kind === 'vendas'){
      STATE.vendasRows = parseVendasWorkbook(wb);
    }
  } catch(err){
    STATE.fileErrors[kind] = err.message || 'Ficheiro inválido.';
    if (kind==='vendas') STATE.vendasRows = null;
  }
  render();
}

function tryProcessAndEnter(){
  if (!STATE.vendasRows) return;
  STATE.results = computeAll();
  STATE.loaded = true;
  persistSessao();               // guarda os dados para poder entrar sem ficheiros na próxima visita
  render();
  carregarGravacoesDoServidor(); // garante que entra com as gravações mais recentes de todos
}

function renderApp(){
  const dataRefStr = STATE.dateList ? STATE.dateList[STATE.dateList.length-1].toLocaleDateString('pt-PT') : '—';

    <button class="${STATE.view===it.id?'active':''}" data-view-mobile="${it.id}">${it.label}</button>`).join('');

  let body = '';

  else if (STATE.view === 'recepcao') body = renderRecepcao();

function bindAppEvents(){
  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.view = btn.dataset.view; render(); });
  });
  document.querySelectorAll('[data-view-mobile]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.view = btn.dataset.viewMobile; render(); });
  });

  if (resetBtn) resetBtn.addEventListener('click', ()=>{
    STATE.loaded = false;

}

/* ============================================================
   VIEW: RECEÇÃO DIÁRIA
   ============================================================ */
function renderRecepcao(){
  const horizonte = STATE.params.horizonte;
  const lastDate = STATE.dateList[STATE.dateList.length-1];
  const futureDates = [];
  for(let t=1;t<=horizonte;t++) futureDates.push(addDays(lastDate,t));
  const unid = unidLabel();
  const temCd = !!STATE.cdMap;
  const jaEmCx = unid === 'CX';

  let rows = STATE.results.slice();
  if (STATE.search){
    const q = STATE.search.toLowerCase();
    rows = rows.filter(x => x.loja.toLowerCase().includes(q) || x.nome.toLowerCase().includes(q));
  }
  if (temCd && STATE.cdFilter !== 'all'){
    rows = rows.filter(x => x.cd === STATE.cdFilter);
  }
  rows.sort((a,b)=> b.qtdReceberHoje - a.qtdReceberHoje);

  const totalPorDia = new Array(horizonte).fill(0);
  rows.forEach(x => x.distribuicaoDiaria.forEach((v,i)=> totalPorDia[i]+=v));
  const totalGeral = rows.reduce((s,x)=>s+x.qtdReceberHoje,0);
  const totalGeralCx = rows.reduce((s,x)=>s+toCaixas(x.qtdReceberHoje),0);

  const headDates = futureDates.map(d => `<th class="num">${d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit'})}<br><span style="font-weight:400; text-transform:none; font-size:10.5px;">${DOW_PT[d.getUTCDay()]}</span></th>`).join('');

  const bodyRows = rows.map(x => {
    const usaPlanning = !!x.distribuicaoDiariaPlanning;
    const serieDiaria = usaPlanning ? x.distribuicaoDiariaPlanning : x.distribuicaoDiaria;
    const cells = serieDiaria.map(v => {
      if (v === null) return `<td class="num"><span class="muted" title="Sem entrega prevista neste dia (Planning)">S/E</span></td>`;
      return `<td class="num">${v>0 ? fmtCx(v) : '<span class="muted">–</span>'}</td>`;
    }).join('');
    const semHistTag = x.semHistorico ? `<span class="chip chip-neutral" style="margin-left:6px; font-size:10px; padding:2px 6px;">sem histórico</span>` : '';
    const zeroReason = (x.qtdReceberHoje<=0 && !x.semHistorico) ? `<span class="muted" style="font-size:10.5px; margin-left:6px;">stock OK</span>` : '';
    return `<tr>
      <td class="row-loja">${x.loja}</td>
      <td>${x.nome}${semHistTag}${zeroReason}</td>
      ${temCd ? `<td>${x.cd||'<span class="muted">—</span>'}</td>` : ''}
      ${cells}
      <td class="num" style="font-weight:700; background:var(--action-soft); color:var(--action-dark);">${fmt1(x.qtdReceberHoje)}</td>
      ${jaEmCx ? '' : `<td class="num" style="font-weight:700; background:var(--warn-soft); color:#7A5A1E;">${fmtCx(x.qtdReceberHoje)}</td>`}
    </tr>`;
  }).join('');

  const totalPorDiaCx = new Array(horizonte).fill(0);
  rows.forEach(x => {
    const serieDiaria = x.distribuicaoDiariaPlanning || x.distribuicaoDiaria;
    serieDiaria.forEach((v,i)=> { if (v!==null) totalPorDiaCx[i]+=toCaixas(v); });
  });
  const footCells = totalPorDiaCx.map(v => `<td class="num">${fmtInt(v)}</td>`).join('');

  const cdOptions = temCd ? [...new Set(Object.values(STATE.cdMap))].sort() : [];
  const cdFilterHtml = temCd ? `
    <select class="search-input" id="filter-cd-recepcao" style="min-width:160px;">
      <option value="all" ${STATE.cdFilter==='all'?'selected':''}>Todos os CD</option>
      ${cdOptions.map(cd=>`<option value="${cd}" ${STATE.cdFilter===cd?'selected':''}>${cd}</option>`).join('')}
    </select>` : '';

  return `
    <div class="eyebrow">Entregável principal</div>
    <h1 class="page-title">Receção Diária</h1>
    <p class="page-sub">Quantidade a receber por loja, em caixas (CX), distribuída dia a dia ao longo dos próximos ${horizonte} dias, proporcional ao perfil de vendas previsto. ${jaEmCx ? 'Todos os valores arredondados sempre para cima.' : `1 CX = ${STATE.params.qtdPorCaixa} ${unid} — todos os valores arredondados sempre para cima.`}${STATE.diasEntregaLoja ? ' Lojas com Planning de Entrega mostram "S/E" nos dias sem entrega prevista.' : ''}</p>

    <div class="toolbar" style="margin:22px 0 16px; justify-content:space-between;">
      <div class="toolbar">
        <input class="search-input" id="search-recepcao" placeholder="Procurar loja por código ou nome…" value="${STATE.search}">
        ${cdFilterHtml}
        <span class="muted" style="font-size:12.5px;">${rows.length} de ${STATE.results.length} lojas · total: <strong style="color:var(--action-dark);">${fmtInt(totalGeral)} ${unid}</strong>${jaEmCx ? '' : ` · <strong style="color:#7A5A1E;">${fmtInt(totalGeralCx)} CX</strong>`}</span>
      </div>
      <div class="toolbar">
        <button class="filter-btn" id="btn-export-xlsx">⭳ Exportar Excel</button>
        <button class="filter-btn" id="btn-export-pdf">⭳ Exportar PDF</button>
      </div>
    </div>

    <div class="panel" id="recepcao-panel">
      <div class="table-wrap" style="max-height:70vh;">
        <table id="recepcao-table">
          <thead><tr>
            <th>Loja</th><th>Nome</th>${temCd?'<th>CD</th>':''}${headDates}<th class="num">Total a Receber (${unid})</th>${jaEmCx ? '' : '<th class="num">Total CX</th>'}
          </tr></thead>
          <tbody>${bodyRows || `<tr><td colspan="${4+horizonte+(temCd?1:0)}" class="empty-state">Nenhuma loja encontrada.</td></tr>`}</tbody>
          <tfoot><tr style="background:var(--bg);">
            <td colspan="${temCd?3:2}" style="font-weight:700;">Total Rede (CX/dia)</td>
            ${footCells}
            <td class="num" style="font-weight:700;">${fmtInt(totalGeral)}</td>
            ${jaEmCx ? '' : `<td class="num" style="font-weight:700;">${fmtInt(totalGeralCx)}</td>`}
          </tr></tfoot>
        </table>
      </div>
    </div>
    <p class="page-sub" style="margin-top:4px;">As colunas diárias mostram caixas (CX) a entregar nesse dia, arredondadas sempre para cima. ${STATE.diasEntregaLoja ? 'Lojas com Planning de Entrega seguem os seus próprios dias de entrega (S/E = sem entrega nesse dia); o total da semana mantém-se igual ao "Total a Receber".' : 'A distribuição diária reparte a quantidade total proporcionalmente ao forecast de vendas de cada dia.'}</p>
  `;
}
