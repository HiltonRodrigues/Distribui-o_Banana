   VIEW: FORECAST E STOCK
   ============================================================ */
const STATUS_LABEL = {
  critico: { txt:'Crítico', cls:'chip-critical' },
  abaixo: { txt:'Abaixo do alvo', cls:'chip-warn' },
  ok: { txt:'OK', cls:'chip-ok' },
  sem_historico: { txt:'Sem histórico', cls:'chip-neutral' },
};

// Gera um <th> clicável para ordenar a tabela "Forecast e Receção" pelo campo indicado.
// Mostra uma seta (▲ asc / ▼ desc) quando esta é a coluna ativa de ordenação. isNum controla
// o alinhamento (classe "num"), independente do tipo de comparação usado em SORTABLE.
function sortableTh(field, label, isNum){
  const ativo = STATE.sortForecast.field === field;
  const seta = ativo ? (STATE.sortForecast.dir === 'asc' ? ' ▲' : ' ▼') : '';
  return `<th class="${isNum?'num ':''}sortable-th${ativo?' sorted':''}" data-sort-field="${field}" title="Ordenar por ${label}">${label}${seta}</th>`;
}

function renderForecast(){
  const unid = unidLabel();
  const temCd = !!STATE.cdMap;
  const jaEmCx = unid === 'CX';
  let rows = STATE.results.slice();
  if (STATE.search){
    const q = STATE.search.toLowerCase();
    rows = rows.filter(x => x.loja.toLowerCase().includes(q) || x.nome.toLowerCase().includes(q));
  }
  if (STATE.statusFilter !== 'all'){
    rows = rows.filter(x => x.status === STATE.statusFilter);
  }
  if (temCd && STATE.cdFilter !== 'all'){
    rows = rows.filter(x => x.cd === STATE.cdFilter);
  }

  // Colunas ordenáveis: campo no objeto x (ou função extratora) + tipo, para saber comparar
  // como texto ou como número. Clicar numa coluna ordena por ela; clicar de novo inverte a
  // direção. Sem ordenação escolhida, mantém a ordenação padrão por criticidade do status.
  const SORTABLE = {
    loja: { get: x => x.loja, type: 'text' },
    nome: { get: x => x.nome, type: 'text' },
    cd: { get: x => x.cd || '', type: 'text' },
    stock: { get: x => x.stockAtual, type: 'num' },
    mediaReal: { get: x => x.mediaReal, type: 'num' },
    coberturaAlvo: { get: x => x.coberturaAlvo, type: 'num' },
    slope: { get: x => x.slope, type: 'num' },
    forecastDia1: { get: x => x.forecastDia1, type: 'num' },
    coberturaAtual: { get: x => x.coberturaAtual, type: 'num' },
    status: { get: x => x.status, type: 'text' },
    forecastHorizonte: { get: x => x.forecastHorizonte, type: 'num' },
    stockNecessario: { get: x => x.stockNecessario, type: 'num' },
    qtdReceberHoje: { get: x => x.qtdReceberHoje, type: 'num' },
  };

  if (STATE.sortForecast.field && SORTABLE[STATE.sortForecast.field]){
    const { get, type } = SORTABLE[STATE.sortForecast.field];
    const dirMult = STATE.sortForecast.dir === 'asc' ? 1 : -1;
    rows.sort((a,b) => {
      let va = get(a), vb = get(b);
      if (type === 'num'){
        va = (va===null || va===undefined || isNaN(va)) ? -Infinity : va;
        vb = (vb===null || vb===undefined || isNaN(vb)) ? -Infinity : vb;
        return (va-vb) * dirMult;
      }
      return String(va).localeCompare(String(vb), 'pt-PT') * dirMult;
    });
  } else {
    rows.sort((a,b)=>{
      const order = {critico:0, abaixo:1, sem_historico:2, ok:3};
      return order[a.status]-order[b.status] || b.qtdReceberHoje-a.qtdReceberHoje;
    });
  }

  const filters = [
    {id:'all', label:'Todas'},
    {id:'critico', label:'Críticas'},
    {id:'abaixo', label:'Abaixo do alvo'},
    {id:'ok', label:'OK'},
    {id:'sem_historico', label:'Sem histórico'},
  ];
  const filterBtns = filters.map(f => `<button class="filter-btn ${STATE.statusFilter===f.id?'active':''}" data-status="${f.id}">${f.label}</button>`).join('');

  const cdOptions = temCd ? [...new Set(Object.values(STATE.cdMap))].sort() : [];
  const cdFilterHtml = temCd ? `
    <select class="search-input" id="filter-cd-forecast" style="min-width:140px;">
      <option value="all" ${STATE.cdFilter==='all'?'selected':''}>Todos os CD</option>
      ${cdOptions.map(cd=>`<option value="${cd}" ${STATE.cdFilter===cd?'selected':''}>${cd}</option>`).join('')}
    </select>` : '';

  const bodyRows = rows.map(x => {
    const st = STATUS_LABEL[x.status];
    const alertMsg = x.semHistorico ? 'Sem histórico de vendas — stock mínimo de segurança garantido' : (x.stockNegativo && !x.stockEditado ? 'Stock negativo no SAP — verificar ajuste' : '');
    return `<tr data-loja="${x.loja}">
      <td class="row-loja">${x.loja}</td>
      <td>${x.nome}</td>
      ${temCd ? `<td>${x.cd||'<span class="muted">—</span>'}</td>` : ''}
      <td class="num"><input class="cell-input stock-input ${x.stockEditado?'edited':''}" data-loja="${x.loja}" type="number" min="0" step="0.1" value="${Math.round((x.stockAtual/(STATE.params.qtdPorCaixa||1))*10)/10}" title="${x.stockEditado?'Valor editado manualmente':'Acumulado das distribuições gravadas (menos venda prevista dos dias seguintes) — clique para editar'}${jaEmCx?'':` · equivale a ${fmt1(x.stockAtual)} ${unid}`}"></td>
      <td class="num">${fmt1(x.mediaReal)}</td>
      <td class="num"><input class="cell-input cov-input" data-loja="${x.loja}" type="number" min="1" max="30" value="${x.coberturaAlvo}"></td>
      <td class="num">${x.slope>=0?'+':''}${x.slope.toFixed(2)}</td>
      <td class="num">${fmt1(x.forecastDia1)}</td>
      <td class="num">${x.coberturaAtual!==null ? fmt1(x.coberturaAtual) : '—'}</td>
      <td><span class="chip ${st.cls}">${st.txt}</span></td>
      <td class="num">${fmt1(x.forecastHorizonte)}</td>
      <td class="num">${fmt1(x.stockNecessario)}</td>
      <td class="num" style="font-weight:700; color:var(--action-dark);">${fmt1(x.qtdReceberHoje)}</td>
      ${jaEmCx ? '' : `<td class="num" style="font-weight:700; color:#7A5A1E;">${fmtCx(x.qtdReceberHoje)}</td>`}
      <td style="font-size:11.5px; color:var(--critical);">${alertMsg}</td>
    </tr>`;
  }).join('');

  const nStockEditado = rows.filter(x=>x.stockEditado).length;

  return `
    <div class="eyebrow">Detalhe por loja</div>
    <h1 class="page-title">Forecast e Receção</h1>
    <p class="page-sub">O stock de cada loja é o acumulado das distribuições <b>gravadas</b> na aba "Distribuição por CD", abatido dia a dia: usa a <b>venda real</b> quando o histórico carregado cobre esses dias, e a venda prevista nos restantes. As gravações ficam guardadas no browser — podes carregar um ficheiro de vendas atualizado sem recomeçar do zero. Cobertura alvo e stock continuam editáveis por loja (clique na célula).</p>

    <div class="toolbar" style="margin:22px 0 16px; justify-content:space-between;">
      <div class="toolbar">
        <input class="search-input" id="search-forecast" placeholder="Procurar loja por código ou nome…" value="${STATE.search}">
        ${cdFilterHtml}
        ${nStockEditado>0 ? `<button class="filter-btn" id="btn-reset-stock" style="color:var(--gold); border-color:var(--gold);">↺ Repor stock calculado (${nStockEditado} editado${nStockEditado>1?'s':''})</button>` : ''}
      </div>
      <div class="toolbar">
        ${filterBtns}
        <button class="filter-btn" id="btn-export-forecast-xlsx">⭳ Excel</button>
        <button class="filter-btn" id="btn-export-forecast-pdf">⭳ PDF</button>
      </div>
    </div>

    <div class="panel" id="forecast-panel">
      <div class="table-wrap" style="max-height:72vh;">
        <table id="forecast-table">
          <thead><tr>
            ${sortableTh('loja','Loja')}${sortableTh('nome','Nome')}${temCd?sortableTh('cd','CD'):''}${sortableTh('stock','Stock (CX)',true)}${sortableTh('mediaReal','Venda Méd./dia',true)}
            ${sortableTh('coberturaAlvo','Cobertura Alvo',true)}${sortableTh('slope','Tendência',true)}${sortableTh('forecastDia1','Forecast D+1',true)}
            ${sortableTh('coberturaAtual','Cobertura Atual',true)}${sortableTh('status','Status')}${sortableTh('forecastHorizonte',`Forecast ${STATE.params.horizonte}d`,true)}
            ${sortableTh('stockNecessario','Stock Necessário',true)}${sortableTh('qtdReceberHoje','A Receber Hoje',true)}${jaEmCx ? '' : '<th class="num">CX a Receber</th>'}<th>Alerta</th>
          </tr></thead>
          <tbody>${bodyRows || `<tr><td colspan="${jaEmCx?14:15}" class="empty-state">Nenhuma loja corresponde ao filtro.</td></tr>`}</tbody>
        </table>
      </div>

    </div>

    ${renderCalendarioSemanalSection(rows, temCd)}
    ${renderTotalPorCDSection(rows, temCd)}
  `;
}

/* ============================================================
   SECÇÃO: CALENDÁRIO SEMANAL DE ENTREGA POR LOJA (Planning de Entrega)
   ============================================================ */
function renderCalendarioSemanalSection(rows, temCd){
  const lojasComCalendario = rows.filter(x => x.calendarioSemanal);
  if (lojasComCalendario.length === 0) return '';

  const unid = unidLabel();
  const jaEmCx = unid === 'CX';
  const qpc = STATE.params.qtdPorCaixa || 1;
  const diasCD = STATE.params.diasEntregaCD || [];
  const diasCDLabel = diasCD.length>0 ? diasCD.join(', ') : 'nenhum definido';

  const headDias = DOW_SEMANA.map(d => `<th class="num">${d}</th>`).join('');

  const bodyRows = lojasComCalendario.map(x => {
    const calc = computeCalendarioSemanalCx(x);
    const celulas = DOW_SEMANA.map((d,idx) => {
      const info = x.calendarioSemanal[idx];
      if (!info) return { cx: null, kg: null, titulo: null, atingiuMax: false };
      const r = calc.porIdx[idx];
      const coberturaTxt = info.diasCobertos.length>1
        ? `cobre ${info.diasCobertos.map(i=>DOW_SEMANA[i]).join('+')}`
        : `cobre ${DOW_SEMANA[info.diasCobertos[0]]}`;
      const motivos = [];
      if (r.atingiuLimiteDiario) motivos.push(`limitado ao máximo de ${STATE.params.maxCxDiaCalendario} CX/dia (necessidade real: ${toCaixas(info.qtd)} CX)`);
      if (r.atingiuLimiteSemanal) motivos.push(`reduzido para não exceder o limite semanal de ${calc.limiteSemanal} CX (venda méd. semanal ${calc.vendaMediaSemanalCx} CX + ${STATE.params.maxExcedenteVendaSemanal} CX)`);
      const atingiuMax = motivos.length>0;
      const titulo = atingiuMax ? `${coberturaTxt} · ${motivos.join(' · ')}` : coberturaTxt;
      return { cx: r.cxFinal, kg: Math.round(r.cxFinal*qpc*10)/10, titulo, atingiuMax };
    });
    const totalExcedeu = (calc.limiteSemanal !== null && calc.total >= calc.limiteSemanal && calc.total > calc.vendaMediaSemanalCx);
    const totalKg = Math.round(calc.total*qpc*10)/10;
    const vendaMediaSemanal = x.mediaReal * 7;
    const vendaMediaDiaCx = toCaixas(x.mediaReal);
    const vendaMediaSemanalCx = toCaixas(vendaMediaSemanal);

    const linhaCx = celulas.map(c => {
      if (c.cx === null) return `<td class="num"><span class="muted">–</span></td>`;
      return `<td class="num" title="${c.titulo}"><span style="font-weight:700; color:${c.atingiuMax?'var(--warn)':'var(--action-dark)'};">${c.cx<=0?'0':Math.round(c.cx).toLocaleString('pt-PT')}</span>${c.atingiuMax ? ' <span style="font-size:10px;">⚠</span>' : ''}</td>`;
    }).join('');
    const linhaKg = celulas.map(c => {
      if (c.kg === null) return `<td class="num" style="border-top:none; padding-top:0;"></td>`;
      return `<td class="num" style="border-top:none; padding-top:0;"><span class="muted" style="font-size:10px;">${fmt1(c.kg)}</span></td>`;
    }).join('');

    return `<tr>
      <td class="row-loja" rowspan="2" style="vertical-align:top;">${x.cd||'<span class="muted">—</span>'}<br><span class="muted" style="font-weight:400; font-size:12px;">${x.loja}</span></td>
      <td class="num" rowspan="2" style="vertical-align:top;" title="Venda média diária prevista para esta loja"><span style="font-weight:700;">${vendaMediaDiaCx<=0?'0':Math.round(vendaMediaDiaCx).toLocaleString('pt-PT')}</span>${jaEmCx ? '' : `<br><span class="muted" style="font-size:10px;">${fmt1(x.mediaReal)} ${unid}</span>`}</td>
      <td class="num" rowspan="2" style="vertical-align:top;" title="Venda média diária × 7 dias"><span style="font-weight:700;">${vendaMediaSemanalCx<=0?'0':Math.round(vendaMediaSemanalCx).toLocaleString('pt-PT')}</span>${jaEmCx ? '' : `<br><span class="muted" style="font-size:10px;">${fmt1(vendaMediaSemanal)} ${unid}</span>`}</td>
      ${linhaCx}
      <td class="num"><span style="font-weight:700; color:${totalExcedeu?'var(--warn)':'var(--action-dark)'};">${Math.round(calc.total).toLocaleString('pt-PT')}</span> <span class="muted" style="font-size:10px;">CX</span></td>
    </tr>
    <tr style="border-bottom:1px solid var(--line-soft);">
      ${linhaKg}
      <td class="num" style="border-top:none; padding-top:0;"><span class="muted" style="font-size:10px;">${fmt1(totalKg)} ${unid}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="panel" id="calendario-semanal-panel" style="margin-top:22px;">
      <div class="panel-head">
        <div>
          <div class="panel-title">Calendário Semanal de Entrega por Loja</div>
          <div class="panel-desc">Com base no Planning de Entrega: cada dia de entrega de uma loja cobre o forecast de vendas até à entrega seguinte da mesma loja. CD recebe do fornecedor às ${diasCDLabel} — a distribuição às lojas ocorre no dia seguinte (D+1) a cada uma dessas entregas.${(STATE.params.maxCxDiaCalendario !== null && STATE.params.maxCxDiaCalendario !== undefined && STATE.params.maxCxDiaCalendario !== '') ? ` Sugestão diária limitada a um máximo de ${STATE.params.maxCxDiaCalendario} CX por loja.` : ''}${(STATE.params.maxExcedenteVendaSemanal !== null && STATE.params.maxExcedenteVendaSemanal !== undefined && STATE.params.maxExcedenteVendaSemanal !== '') ? ` Total semanal limitado à venda média semanal + ${STATE.params.maxExcedenteVendaSemanal} CX.` : ''}${(STATE.params.maxCxDiaCalendario !== null && STATE.params.maxCxDiaCalendario !== undefined && STATE.params.maxCxDiaCalendario !== '') || (STATE.params.maxExcedenteVendaSemanal !== null && STATE.params.maxExcedenteVendaSemanal !== undefined && STATE.params.maxExcedenteVendaSemanal !== '') ? ' ⚠ indica dias/totais em que a sugestão foi reduzida por um destes limites.' : ''}</div>
        </div>
      </div>
      <div class="panel-body" style="padding:0;">
        <div class="table-wrap" style="max-height:60vh;">
          <table>
            <thead><tr>
              <th>CD / Loja</th><th class="num">Venda Méd./dia</th><th class="num">Venda Méd. Semanal</th>${headDias}<th class="num">Total Semana</th>
            </tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
      </div>
      <div class="panel-body" style="padding-top:0; border-top:1px solid var(--line-soft);">
        <p class="page-sub" style="margin:0;">Em cada loja, a linha de cima mostra as caixas (CX) a enviar nesse dia da semana e a linha de baixo a quantidade correspondente em ${unid}, calculada para cobrir o período até à entrega seguinte da mesma loja. Lojas sem dias de entrega definidos no Planning não aparecem aqui — ${rows.length - lojasComCalendario.length} loja${rows.length-lojasComCalendario.length!==1?'s':''} sem essa informação.</p>
      </div>
    </div>
  `;
}

/* ============================================================
   SECÇÃO: TOTAL DE CAIXAS POR CD E DIA DA SEMANA
   Agrega o Calendário Semanal de Entrega por Loja somando todas as lojas de cada CD,
   dia a dia — útil para dimensionar o que cada CD precisa enviar/preparar por dia.
   ============================================================ */
function renderTotalPorCDSection(rows, temCd){
  if (!temCd) return '';
  const diasCD = STATE.params.diasEntregaCD || [];
  const idxDiasCD = diasCD.map(d => DOW_SEMANA.indexOf(d)).filter(i => i>=0).sort((a,b)=>a-b);
  if (idxDiasCD.length === 0) return '';
  const agregados = computeTotalCxPorCDEDia(rows);
  if (agregados.length === 0) return '';
  const unid = unidLabel();
  const jaEmCx = unid === 'CX';

  const headDias = idxDiasCD.map(idx => `<th class="num">${DOW_SEMANA[idx]}</th>`).join('');
  const bodyRows = agregados.map(agr => {
    const cellsCx = idxDiasCD.map(idx => {
      const v = agr.porDiaCD[idx] || 0;
      return `<td class="num" title="Receção no CD a ${DOW_SEMANA[idx]} → distribuição às lojas a ${DOW_SEMANA[(idx+1)%7]} (D+1)">${v<=0?'<span class="muted">–</span>':`<span style="font-weight:700; color:var(--action-dark);">${Math.round(v).toLocaleString('pt-PT')}</span>`}</td>`;
    }).join('');
    if (jaEmCx){
      return `<tr>
        <td class="row-loja">${agr.cd}</td>
        <td class="num">${agr.nLojas}</td>
        ${cellsCx}
        <td class="num" style="font-weight:700; color:var(--action-dark);">${Math.round(agr.total).toLocaleString('pt-PT')}</td>
      </tr>`;
    }
    const cellsQtd = idxDiasCD.map(idx => {
      const v = agr.porDiaCDQtd[idx] || 0;
      return `<td class="num" style="border-top:none; padding-top:0;">${v<=0?'':`<span class="muted" style="font-size:10px;">${fmt1(v)}</span>`}</td>`;
    }).join('');
    return `<tr>
      <td class="row-loja" rowspan="2" style="vertical-align:top;">${agr.cd}</td>
      <td class="num" rowspan="2" style="vertical-align:top;">${agr.nLojas}</td>
      ${cellsCx}
      <td class="num"><span style="font-weight:700; color:var(--action-dark);">${Math.round(agr.total).toLocaleString('pt-PT')}</span> <span class="muted" style="font-size:10px;">CX</span></td>
    </tr>
    <tr style="border-bottom:1px solid var(--line-soft);">
      ${cellsQtd}
      <td class="num" style="border-top:none; padding-top:0;"><span class="muted" style="font-size:10px;">${fmt1(agr.totalQtd)} ${unid}</span></td>
    </tr>`;
  }).join('');
  const totalGeralPorDiaCx = idxDiasCD.map(idx => agregados.reduce((s,a)=>s+(a.porDiaCD[idx]||0),0));
  const totalGeralPorDiaQtd = idxDiasCD.map(idx => agregados.reduce((s,a)=>s+(a.porDiaCDQtd[idx]||0),0));
  const totalGeralCx = agregados.reduce((s,a)=>s+a.total,0);
  const totalGeralQtd = agregados.reduce((s,a)=>s+a.totalQtd,0);
  const footRow = jaEmCx ? `<tr style="background:var(--bg);">
    <td style="font-weight:700;">Total Geral</td>
    <td class="num" style="font-weight:700;">${agregados.reduce((s,a)=>s+a.nLojas,0)}</td>
    ${totalGeralPorDiaCx.map(v=>`<td class="num" style="font-weight:700;">${Math.round(v).toLocaleString('pt-PT')}</td>`).join('')}
    <td class="num" style="font-weight:700;">${Math.round(totalGeralCx).toLocaleString('pt-PT')}</td>
  </tr>` : `<tr style="background:var(--bg);">
    <td style="font-weight:700;" rowspan="2">Total Geral</td>
    <td class="num" style="font-weight:700;" rowspan="2">${agregados.reduce((s,a)=>s+a.nLojas,0)}</td>
    ${totalGeralPorDiaCx.map(v=>`<td class="num" style="font-weight:700;">${Math.round(v).toLocaleString('pt-PT')}</td>`).join('')}
    <td class="num" style="font-weight:700;">${Math.round(totalGeralCx).toLocaleString('pt-PT')} CX</td>
  </tr>
  <tr style="background:var(--bg);">
    ${totalGeralPorDiaQtd.map(v=>`<td class="num" style="border-top:none; padding-top:0;"><span class="muted" style="font-size:10px;">${fmt1(v)}</span></td>`).join('')}
    <td class="num" style="border-top:none; padding-top:0;"><span class="muted" style="font-size:10px;">${fmt1(totalGeralQtd)} ${unid}</span></td>
  </tr>`;

  return `
    <div class="panel" id="total-por-cd-panel" style="margin-top:22px;">
      <div class="panel-head">
        <div>
          <div class="panel-title">Total de Caixas por CD e Dia da Semana</div>
          <div class="panel-desc">${jaEmCx ? `Quantidade de caixas (CX) que cada CD precisa de receber do fornecedor em cada dia configurado em "Dias em que o CD recebe do fornecedor" (${diasCD.join(', ') || 'nenhum definido'})` : `Forecast de vendas (${unid}) e o respetivo equivalente em caixas (CX) que cada CD precisa de receber do fornecedor em cada dia configurado em "Dias em que o CD recebe do fornecedor" (${diasCD.join(', ') || 'nenhum definido'})`} — calculado a partir do que as lojas desse CD vão receber no dia seguinte (D+1).${jaEmCx ? ' Já com os limites diário e de excedente semanal aplicados no Calendário Semanal de Entrega por Loja.' : ` A linha de CX já reflete os limites diário e de excedente semanal aplicados no Calendário Semanal de Entrega por Loja; a linha de ${unid} é o forecast de vendas puro, sem esses limites.`}</div>
        </div>
      </div>
      <div class="panel-body" style="padding:0;">
        <div class="table-wrap" style="max-height:40vh;">
          <table>
            <thead><tr>
              <th>CD</th><th class="num">Nº Lojas</th>${headDias}<th class="num">Total</th>
            </tr></thead>
            <tbody>${bodyRows}</tbody>
            <tfoot>${footRow}</tfoot>
          </table>
        </div>
      </div>
    </div>
  `;
}

/* ============================================================
   CALCULO: DISTRIBUIÇÃO POR CD
   ============================================================ */
// Devolve a necessidade (qtd a receber) de uma loja para a proxima ocorrencia de um dado dia da
// semana ('Seg'..'Dom'), usando a serie distribuicaoDiariaPlanning ja alinhada a datas concretas
// (Receção Diária). Se a loja nao tiver Planning ou nao tiver entrega nesse dia, devolve null.
function necessidadeLojaNoDiaSemana(loja, diaSemana){
  if (!loja.distribuicaoDiariaPlanning) return null;
  const lastDate = STATE.dateList[STATE.dateList.length-1];
  const idxDiaAlvo = DOW_SEMANA.indexOf(diaSemana);
  if (idxDiaAlvo < 0) return null;
  // procura, dentro do horizonte ja calculado, a primeira data cujo dia da semana coincide
  for (let t=0; t<loja.distribuicaoDiariaPlanning.length; t++){
    const d = addDays(lastDate, t+1);
    const idxSemana = (d.getUTCDay()+6) % 7;
    if (idxSemana === idxDiaAlvo){
      const v = loja.distribuicaoDiariaPlanning[t];
      return v === null ? null : v;
    }
  }
  return null;
}

function computeDistribuicaoPorCD(cd, diaSemana){
  let lojasCD = STATE.results.filter(x => x.cd === cd);
  let necessidadePorLoja; // array alinhado com lojasCD

  if (diaSemana){
    // Filtra apenas lojas que tem entrega nesse dia da semana (segundo o Planning)
    lojasCD = lojasCD.filter(x => x.diasEntrega && x.diasEntrega.includes(diaSemana));
    necessidadePorLoja = lojasCD.map(x => necessidadeLojaNoDiaSemana(x, diaSemana) || 0);
  } else {
    necessidadePorLoja = lojasCD.map(x => x.qtdReceberHoje);
  }

  const necessidadeTotal = necessidadePorLoja.reduce((a,b)=>a+b,0);
  const chaveQtd = diaSemana ? `${cd}__${diaSemana}` : cd;
  const qtdRecebidaCx = STATE.qtdRecebidaPorCD[chaveQtd];
  const temQtdRecebida = (qtdRecebidaCx !== undefined && qtdRecebidaCx !== null && qtdRecebidaCx !== '');
  const qpc = STATE.params.qtdPorCaixa || 1;
  // A quantidade recebida é lançada manualmente em caixas (CX) e convertida para a unidade
  // base (UN/KG) para ser comparada/distribuída face à necessidade, que está sempre em unidade base.
  const qtdRecebidaNum = temQtdRecebida ? Math.max(0, Number(qtdRecebidaCx) * qpc) : necessidadeTotal;

  let distribuicao;
  let modo;
  if (qtdRecebidaNum >= necessidadeTotal){
    // Quantidade suficiente: cada loja recebe exatamente o que precisava
    modo = 'suficiente';
    distribuicao = lojasCD.map((x,i) => ({ loja:x, qtd: necessidadePorLoja[i] }));
  } else {
    // Quantidade insuficiente: 1) garantir a falta de stock mínimo de segurança a quem precisa,
    // 2) distribuir o restante por venda média. Lojas que já têm stock OK (necessidade=0)
    // nunca recebem nada nesta fase de segurança — só entram na fase de venda média se sobrar.
    modo = 'insuficiente';
    const segGlobal = STATE.params.stockMinSeg;
    let restante = qtdRecebidaNum;

    // Falta de seguranca por loja: se o stock atual estiver abaixo do minimo de seguranca,
    // assume-se a quantidade TOTAL definida no Stock Mínimo de Segurança (não apenas a diferença
    // até lá chegar). Nunca mais do que a propria necessidade da loja nesse dia (uma loja com
    // stock OK, ou já acima do mínimo, tem falta = 0).
    const faltaSeg = lojasCD.map((x,i)=> Math.min(necessidadePorLoja[i], x.stockAtual < segGlobal ? segGlobal : 0));
    const totalFaltaSeg = faltaSeg.reduce((a,b)=>a+b,0);

    let segAlocada;
    if (totalFaltaSeg <= 0){
      segAlocada = lojasCD.map(()=>0);
    } else if (restante >= totalFaltaSeg){
      segAlocada = faltaSeg.slice();
      restante -= totalFaltaSeg;
    } else {
      // nao chega para cobrir a falta de seguranca de todas as que precisam: rateia
      // proporcionalmente a propria falta de seguranca de cada loja (nao a venda media,
      // para nao excluir lojas sem historico que tem mediaReal=0 mas precisam de seguranca).
      segAlocada = lojasCD.map((x,i)=> faltaSeg[i]>0 ? restante * (faltaSeg[i]/totalFaltaSeg) : 0);
      restante = 0;
    }

    // Restante (apos cobrir a seguranca) distribuido proporcionalmente a venda media de TODAS as lojas
    // (incluindo as que ja tinham seguranca garantida, para repor o que ainda falta da sua necessidade total).
    const restanteNecessidade = lojasCD.map((x,i)=> Math.max(0, necessidadePorLoja[i] - segAlocada[i]));
    const totalRestanteNecessidade = restanteNecessidade.reduce((a,b)=>a+b,0);
    let extraPorLoja;
    if (totalRestanteNecessidade>0){
      extraPorLoja = lojasCD.map((x,i)=> Math.min(restanteNecessidade[i], restante * (restanteNecessidade[i]/totalRestanteNecessidade)));
    } else {
      extraPorLoja = lojasCD.map(()=>0);
    }

    distribuicao = lojasCD.map((x,i) => ({ loja:x, qtd: Math.round((segAlocada[i] + extraPorLoja[i])*10)/10 }));
  }

  // Limite manual de caixas por dia (STATE.params.maxCxDiaDistribuicaoCD) — aplicado apenas
  // quando um dia específico da semana está selecionado (diaSemana), já que no modo "Todos os
  // dias" o valor mostrado é o total do período, não de um único dia de entrega.
  const maxCx = STATE.params.maxCxDiaDistribuicaoCD;
  const temLimiteDia = diaSemana && (maxCx !== null && maxCx !== undefined && maxCx !== '' && !isNaN(maxCx));
  if (temLimiteDia){
    const qpc2 = STATE.params.qtdPorCaixa || 1;
    const maxQtd = maxCx * qpc2;
    distribuicao = distribuicao.map(d => {
      const atingiuMax = d.qtd > maxQtd;
      return atingiuMax ? { ...d, qtd: maxQtd, atingiuMaxDia: true, qtdAntesLimite: d.qtd } : d;
    });
  }

  return { lojasCD, necessidadeTotal, necessidadePorLoja, qtdRecebida: qtdRecebidaNum, temQtdRecebida, modo, distribuicao };
}

// Aplica as edições manuais da coluna "CX a Distribuir" sobre a distribuição calculada.
// Devolve, por loja: cxSugerido (cálculo), cxFinal (edição ou sugestão), qtdFinal (unid. base)
// e a flag editado. A quantidade final em unidade base de uma linha editada é cx × qtd/caixa.
function aplicarEdicoesDistribuicao(distribuicao, chave){
  const qpc = STATE.params.qtdPorCaixa || 1;
  const edits = STATE.distribuicaoEditada[chave] || {};
  return distribuicao.map(d => {
    const cxSugerido = toCaixas(d.qtd);
    const editado = (d.loja.loja in edits);
    const cxFinal = editado ? edits[d.loja.loja] : cxSugerido;
    const qtdFinal = editado ? Math.round(cxFinal * qpc * 10)/10 : d.qtd;
    return { ...d, cxSugerido, cxFinal, qtdFinal, editado };
  });
}

// Grava a distribuição atual de um CD: acumula, por loja, a quantidade "a distribuir" (com as
// edições manuais aplicadas) no stock gravado, com a data de hoje. O stock da aba "Forecast e
// Receção" passa a refletir este acumulado, descontando a venda prevista dos dias seguintes.
function gravarDistribuicaoCD(cd){
  const temPlanning = !!STATE.diasEntregaLoja;
  const diaSelecionado = STATE.diaCDSelecionado && STATE.diaCDSelecionado[cd] ? STATE.diaCDSelecionado[cd] : null;
  const diaParaCalculo = (temPlanning && diaSelecionado && diaSelecionado !== 'Todos os dias') ? diaSelecionado : null;
  const chave = diaParaCalculo ? `${cd}__${diaParaCalculo}` : cd;

  const { distribuicao } = computeDistribuicaoPorCD(cd, diaParaCalculo);
  const final = aplicarEdicoesDistribuicao(distribuicao, chave);
  const hoje = dateKey(new Date());
  let totalCx = 0;
  const novasEntradas = [];
  final.forEach(d => {
    if (!d.qtdFinal || d.qtdFinal <= 0) return;
    if (!STATE.stockGravado[d.loja.loja]) STATE.stockGravado[d.loja.loja] = [];
    STATE.stockGravado[d.loja.loja].push({ qtd: d.qtdFinal, data: hoje, cd });
    novasEntradas.push({ loja: d.loja.loja, qtd: d.qtdFinal, data: hoje, cd });
    totalCx += d.cxFinal;
  });
  const gravacao = { cd, data: new Date().toISOString(), totalCx, dia: diaParaCalculo || 'Todos os dias' };
  if (!STATE.gravacoesPorCD[cd]) STATE.gravacoesPorCD[cd] = [];
  STATE.gravacoesPorCD[cd].push({ data: gravacao.data, totalCx, dia: gravacao.dia });
  persistGravacoes();
  recalcAndRender();
  // envia ao servidor partilhado (o servidor junta e devolve o estado completo,
  // incluindo gravações feitas por outros utilizadores)
  sincronizarAcao({ action: 'gravar', entradas: novasEntradas, gravacao });
}

// Remove todas as gravações de um CD (do log e do stock acumulado das lojas).
function limparGravacoesCD(cd){
  Object.keys(STATE.stockGravado).forEach(loja => {
    STATE.stockGravado[loja] = STATE.stockGravado[loja].filter(e => e.cd !== cd);
    if (STATE.stockGravado[loja].length === 0) delete STATE.stockGravado[loja];
  });
  delete STATE.gravacoesPorCD[cd];
  persistGravacoes();
  sincronizarAcao({ action: 'limpar_cd', cd });
  recalcAndRender();
}

   EVENT BINDING per view
   ============================================================ */
// Guarda a sessão (parâmetros incluídos) de forma diferida: qualquer alteração de
// parâmetros ou edição chama recalcAndRender, e 800ms depois a sessão atualizada é
// gravada no browser e enviada ao servidor partilhado — assim os parâmetros definidos
// ficam guardados para a próxima entrada, em qualquer computador.
let _persistSessaoTimer = null;
function persistSessaoDebounced(){
  if (!STATE.loaded || !STATE.vendasRows) return;
  clearTimeout(_persistSessaoTimer);
  _persistSessaoTimer = setTimeout(persistSessao, 800);
}

function recalcAndRender(){
  STATE.results = computeAll();
  render();
  persistSessaoDebounced();
}

function exportRecepcaoExcel(){
  const horizonte = STATE.params.horizonte;
  const lastDate = STATE.dateList[STATE.dateList.length-1];
  const futureDates = [];
  for(let t=1;t<=horizonte;t++) futureDates.push(addDays(lastDate,t));
  const unid = unidLabel();
  const jaEmCx = unid === 'CX';
  const temCd = !!STATE.cdMap;

  let rows = STATE.results.slice();
  if (STATE.search){
    const q = STATE.search.toLowerCase();
    rows = rows.filter(x => x.loja.toLowerCase().includes(q) || x.nome.toLowerCase().includes(q));
  }
  if (temCd && STATE.cdFilter !== 'all'){
    rows = rows.filter(x => x.cd === STATE.cdFilter);
  }
  rows.sort((a,b)=> b.qtdReceberHoje - a.qtdReceberHoje);

  const dateLabels = futureDates.map(d=>d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit'})+' (CX)');
  const header = ['Cód. Loja','Nome Loja', ...(temCd?['CD']:[]), ...dateLabels, `Total a Receber (${unid})`, ...(jaEmCx?[]:['Total CX'])];
  const dataRows = rows.map(x => {
    const serieDiaria = x.distribuicaoDiariaPlanning || x.distribuicaoDiaria;
    return [
      x.loja, x.nome, ...(temCd?[x.cd||'']:[]),
      ...serieDiaria.map(v => v===null ? 'S/E' : toCaixas(v)),
      Math.round(x.qtdReceberHoje*10)/10, ...(jaEmCx?[]:[toCaixas(x.qtdReceberHoje)])
    ];
  });
  const totalRow = ['', 'TOTAL REDE', ...(temCd?['']:[]),
    ...(()=>{
      const t=new Array(horizonte).fill(0);
      rows.forEach(x=>{
        const serieDiaria = x.distribuicaoDiariaPlanning || x.distribuicaoDiaria;
        serieDiaria.forEach((v,i)=>{ if (v!==null) t[i]+=toCaixas(v); });
      });
      return t;
    })(),
    Math.round(rows.reduce((s,x)=>s+x.qtdReceberHoje,0)*10)/10,
    ...(jaEmCx?[]:[rows.reduce((s,x)=>s+toCaixas(x.qtdReceberHoje),0)])
  ];

  const ws = XLSX.utils.aoa_to_sheet([header, ...dataRows, totalRow]);
  ws['!cols'] = [{wch:11},{wch:26}, ...(temCd?[{wch:10}]:[]), ...futureDates.map(()=>({wch:11})), {wch:16}, ...(jaEmCx?[]:[{wch:9}])];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Receção Diária');

  const dataStr = lastDate.toLocaleDateString('pt-PT').replace(/\//g,'-');
  XLSX.writeFile(wb, `Recepcao_Diaria_${dataStr}.xlsx`);
}

function exportForecastExcel(){

    x.coberturaAlvo, Math.round(x.slope*100)/100, Math.round(x.forecastDia1*10)/10,
    x.coberturaAtual!==null?Math.round(x.coberturaAtual*10)/10:'', STATUS_LABEL[x.status].txt,
    Math.round(x.forecastHorizonte*10)/10, Math.round(x.stockNecessario*10)/10,
    Math.round(x.qtdReceberHoje*10)/10, ...(jaEmCx?[]:[toCaixas(x.qtdReceberHoje)]),
    x.semHistorico ? 'Sem histórico de vendas' : (x.stockNegativo && !x.stockEditado ? 'Stock negativo no SAP' : '')
  ]);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Forecast e Receção');

  if (wsCalendario){

  }

function buildCalendarioSemanalSheet(rows, temCd){
  const lojasComCalendario = rows.filter(x => x.calendarioSemanal);
  if (lojasComCalendario.length === 0) return null;

  const unid = unidLabel();
  const qpc = STATE.params.qtdPorCaixa || 1;
  const header = ['CD','Loja','Venda Méd./dia (CX)','Venda Méd. Semanal (CX)', ...DOW_SEMANA, 'Total Semana'];
  const aoa = [header];
  const merges = [];

  lojasComCalendario.forEach(x => {
    const calc = computeCalendarioSemanalCx(x);
    const vendaMediaSemanal = x.mediaReal * 7;
    const rowCx = [x.cd||'', x.loja, toCaixas(x.mediaReal), toCaixas(vendaMediaSemanal)];
    const rowKg = ['', '', '', ''];
    DOW_SEMANA.forEach((d, idx) => {
      const info = x.calendarioSemanal[idx];
      if (!info){
        rowCx.push('');
        rowKg.push('');
      } else {
        const cx = calc.porIdx[idx].cxFinal;
        rowCx.push(cx);
        rowKg.push(Math.round(cx*qpc*10)/10);
      }
    });
    rowCx.push(calc.total);
    rowKg.push(Math.round(calc.total*qpc*10)/10);

    const startRow = aoa.length; // 0-based index dentro do aoa, antes de adicionar
    aoa.push(rowCx, rowKg);
    // mescla as colunas CD (A), Loja (B), Venda Méd./dia (C) e Venda Méd. Semanal (D) verticalmente
    // pelas 2 linhas desta loja — são valores fixos por loja, iguais nas linhas de CX e de KG.
    merges.push({ s:{r:startRow, c:0}, e:{r:startRow+1, c:0} });
    merges.push({ s:{r:startRow, c:1}, e:{r:startRow+1, c:1} });
    merges.push({ s:{r:startRow, c:2}, e:{r:startRow+1, c:2} });
    merges.push({ s:{r:startRow, c:3}, e:{r:startRow+1, c:3} });
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = merges;
  ws['!cols'] = [{wch:11},{wch:9},{wch:16},{wch:18}, ...DOW_SEMANA.map(()=>({wch:9})), {wch:13}];
  return ws;
}

// Gera uma sheet por CD: lista as lojas desse CD com as caixas sugeridas em cada dia da semana
// (já com os limites diário e semanal aplicados) e, no fim, uma linha "TOTAL CD" com a soma de
// todas as lojas em cada dia — a mesma agregação usada na view "Total por CD" do dashboard.
// Devolve [{ nome, ws }], um item por CD (nome da sheet limitado a 31 caracteres, único no livro).
function buildSheetsPorCD(rows){
  const lojasComCalendario = rows.filter(x => x.calendarioSemanal);
  if (lojasComCalendario.length === 0) return [];
  const qpc = STATE.params.qtdPorCaixa || 1;
  const agregados = computeTotalCxPorCDEDia(rows);
  const usedNames = new Set();
  const sheets = [];
  agregados.forEach(agr => {
    const lojasDoCD = lojasComCalendario.filter(x => (x.cd || '— Sem CD —') === agr.cd);
    const header = ['CD','Loja','Venda Méd./dia (CX)','Venda Méd. Semanal (CX)', ...DOW_SEMANA, 'Total Semana'];
    const aoa = [header];
    const merges = [];
    lojasDoCD.forEach(x => {
      const calc = computeCalendarioSemanalCx(x);
      const vendaMediaSemanal = x.mediaReal * 7;
      const rowCx = [x.cd||'', x.loja, toCaixas(x.mediaReal), toCaixas(vendaMediaSemanal)];
      const rowKg = ['', '', '', ''];
      DOW_SEMANA.forEach((d, idx) => {
        if (!x.calendarioSemanal[idx]){
          rowCx.push('');
          rowKg.push('');
        } else {
          const cx = calc.porIdx[idx].cxFinal;
          rowCx.push(cx);
          rowKg.push(Math.round(cx*qpc*10)/10);
        }
      });
      rowCx.push(calc.total);
      rowKg.push(Math.round(calc.total*qpc*10)/10);
      const startRow = aoa.length;
      aoa.push(rowCx, rowKg);
      merges.push({ s:{r:startRow, c:0}, e:{r:startRow+1, c:0} });
      merges.push({ s:{r:startRow, c:1}, e:{r:startRow+1, c:1} });
      merges.push({ s:{r:startRow, c:2}, e:{r:startRow+1, c:2} });
      merges.push({ s:{r:startRow, c:3}, e:{r:startRow+1, c:3} });
    });
    const totalPorDiaEntregaLoja = [0,0,0,0,0,0,0];
    lojasDoCD.forEach(x => {
      const calc = computeCalendarioSemanalCx(x);
      DOW_SEMANA.forEach((d, idx) => {
        if (x.calendarioSemanal[idx]) totalPorDiaEntregaLoja[idx] += calc.porIdx[idx].cxFinal;
      });
    });
    const linhaTotalCx = ['', 'TOTAL CD', '', '', ...totalPorDiaEntregaLoja.map(v => Math.round(v)), Math.round(agr.total)];
    const linhaTotalKg = ['', '', '', '', ...totalPorDiaEntregaLoja.map(v => Math.round(v*qpc*10)/10), Math.round(agr.total*qpc*10)/10];
    const startRowTotal = aoa.length;
    aoa.push(linhaTotalCx, linhaTotalKg);
    merges.push({ s:{r:startRowTotal, c:0}, e:{r:startRowTotal+1, c:0} });

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = merges;
    ws['!cols'] = [{wch:11},{wch:9},{wch:16},{wch:18}, ...DOW_SEMANA.map(()=>({wch:9})), {wch:13}];
    let nome = agr.cd.replace(/[\\/?*[\]:]/g, ' ').trim().slice(0,28) || 'CD';
    let nomeFinal = `CD ${nome}`.slice(0,31);
    let suffix = 1;
    while (usedNames.has(nomeFinal)){
      nomeFinal = `CD ${nome}`.slice(0, 31-String(suffix).length-1) + ' ' + suffix;
      suffix++;
    }
    usedNames.add(nomeFinal);
    sheets.push({ nome: nomeFinal, ws });
  });
  return sheets;
}

function bindViewEvents(){

  if (filterCdRecepcao) filterCdRecepcao.addEventListener('change', (e)=>{ STATE.cdFilter = e.target.value; render(); });
  const filterCdForecast = document.getElementById('filter-cd-forecast');
  if (filterCdForecast) filterCdForecast.addEventListener('change', (e)=>{ STATE.cdFilter = e.target.value; render(); });

  // Repor stock editado manualmente
  const btnResetStock = document.getElementById('btn-reset-stock');
  if (btnResetStock) btnResetStock.addEventListener('click', ()=>{ STATE.stockOverride = {}; recalcAndRender(); });

  // Quantidade recebida por CD, lançada manualmente em caixas (CX) — chave pode ser "CD" ou "CD__Dia"
  document.querySelectorAll('.qtd-recebida-input').forEach(inp=>{
    inp.addEventListener('change', (e)=>{
      const chave = e.target.dataset.chave || e.target.dataset.cd;
      const val = e.target.value;
      if (val === ''){ delete STATE.qtdRecebidaPorCD[chave]; }
      else {
        const num = parseFloat(val);
        if (!isNaN(num) && num>=0) STATE.qtdRecebidaPorCD[chave] = num;
      }
      render();
    });
  });

  // Seletor de dia da semana por CD (Distribuição por CD)
  document.querySelectorAll('.day-cd-select').forEach(sel=>{
    sel.addEventListener('change', (e)=>{
      const cd = e.target.dataset.cd;
      STATE.diaCDSelecionado[cd] = e.target.value;
      render();
    });
  });

  // Edição manual da coluna "CX a Distribuir" (Distribuição por CD) — chave = "CD" ou "CD__Dia".
  // Apagar o valor repõe a sugestão calculada.
  document.querySelectorAll('.dist-cx-input').forEach(inp=>{
    inp.addEventListener('change', (e)=>{
      const chave = e.target.dataset.chave;
      const loja = e.target.dataset.loja;
      const raw = e.target.value;
      if (raw === ''){
        if (STATE.distribuicaoEditada[chave]){
          delete STATE.distribuicaoEditada[chave][loja];
          if (Object.keys(STATE.distribuicaoEditada[chave]).length === 0) delete STATE.distribuicaoEditada[chave];
        }
      } else {
        const v = parseFloat(raw);
        if (isNaN(v) || v < 0) return;
        if (!STATE.distribuicaoEditada[chave]) STATE.distribuicaoEditada[chave] = {};
        STATE.distribuicaoEditada[chave][loja] = v;
      }
      render();
    });
  });

  // Gravar distribuição de um CD (acumula no stock das lojas) e limpar gravações
  document.querySelectorAll('.btn-gravar-cd').forEach(btn=>{
    btn.addEventListener('click', ()=> gravarDistribuicaoCD(btn.dataset.cd));
  });
  document.querySelectorAll('.btn-limpar-gravacoes').forEach(btn=>{
    btn.addEventListener('click', ()=> limparGravacoesCD(btn.dataset.cd));
  });

      const pos = e.target.selectionStart;
      render();
      const el = document.getElementById('search-recepcao');
      if (el){ el.focus(); el.setSelectionRange(pos,pos); }
    });

  if (searchForecast){
    searchForecast.addEventListener('input', (e)=>{
      STATE.search = e.target.value;
      const pos = e.target.selectionStart;
      render();
      const el = document.getElementById('search-forecast');
      if (el){ el.focus(); el.setSelectionRange(pos,pos); }
    });

    btn.addEventListener('click', ()=>{ STATE.statusFilter = btn.dataset.status; render(); });
  });

  // Ordenação clicável das colunas da tabela "Forecast e Receção"

    th.addEventListener('click', ()=>{
      const field = th.dataset.sortField;
      if (STATE.sortForecast.field === field){
        STATE.sortForecast.dir = STATE.sortForecast.dir === 'asc' ? 'desc' : 'asc';

        STATE.sortForecast.dir = 'desc';
      }
      render();
    });

    });

    inp.addEventListener('change', (e)=>{
      const loja = e.target.dataset.loja;
      const vCx = parseFloat(e.target.value);
      if (!isNaN(vCx) && vCx>=0){
        const qpc = STATE.params.qtdPorCaixa || 1;
        STATE.stockOverride[loja] = vCx * qpc;
        recalcAndRender();
      }
    });
  });

  // Botão "Repor parâmetros padrão" — repõe todos os parâmetros globais nos valores DEFAULT_PARAMS
  const btnResetParams = document.getElementById('btn-reset-params');

  if (pCobertura) pCobertura.addEventListener('change', (e)=>{
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v>0){ STATE.params.coberturaAlvoGlobal = v; recalcAndRender(); }
  });
  const pHorizonte = document.getElementById('param-horizonte');
  if (pHorizonte) pHorizonte.addEventListener('change', (e)=>{
    const v = parseInt(e.target.value);
    if (!isNaN(v) && v>0 && v<=14){ STATE.params.horizonte = v; recalcAndRender(); }

  const pNDias = document.getElementById('param-ndias');

    if (!isNaN(v) && v>=3){ STATE.params.nDiasTendencia = v; recalcAndRender(); }

    if (!isNaN(vCx) && vCx>=0){

      STATE.params.stockMinSeg = vCx * qpc;
      recalcAndRender();

  document.querySelectorAll('.day-cd-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const day = btn.dataset.day;
      const atual = STATE.params.diasEntregaCD || [];
      if (atual.includes(day)){
        STATE.params.diasEntregaCD = atual.filter(d=>d!==day);
      } else {
        STATE.params.diasEntregaCD = [...atual, day];
      }
      recalcAndRender();
    });
  });
  const pMaxCxCalendario = document.getElementById('param-maxcxcalendario');
  if (pMaxCxCalendario) pMaxCxCalendario.addEventListener('change', (e)=>{
    const raw = e.target.value;
    if (raw === ''){
      STATE.params.maxCxDiaCalendario = null;
    } else {
      const v = parseInt(raw);
      if (!isNaN(v) && v>=0) STATE.params.maxCxDiaCalendario = v;
      else return;
    }
    recalcAndRender();
  });
  const pMaxExcedenteVenda = document.getElementById('param-maxexcedentevenda');
  if (pMaxExcedenteVenda) pMaxExcedenteVenda.addEventListener('change', (e)=>{
    const raw = e.target.value;
    if (raw === ''){
      STATE.params.maxExcedenteVendaSemanal = null;
    } else {
      const v = parseInt(raw);
      if (!isNaN(v) && v>=0) STATE.params.maxExcedenteVendaSemanal = v;
      else return;
    }
    recalcAndRender();
  });
  const pMaxCxDiaDistribuicaoCD = document.getElementById('param-maxcxdiadistribuicaocd');
  if (pMaxCxDiaDistribuicaoCD) pMaxCxDiaDistribuicaoCD.addEventListener('change', (e)=>{
    const raw = e.target.value;
    if (raw === ''){
      STATE.params.maxCxDiaDistribuicaoCD = null;
    } else {
      const v = parseInt(raw);
      if (!isNaN(v) && v>=0) STATE.params.maxCxDiaDistribuicaoCD = v;
      else return;
    }
    recalcAndRender();
  });
  const pQtdCaixa = document.getElementById('param-qtdcaixa');
  if (pQtdCaixa) pQtdCaixa.addEventListener('change', (e)=>{
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v>0){ STATE.params.qtdPorCaixa = v; recalcAndRender(); }
  });
}

/* ============================================================
   INIT
   ============================================================ */
loadGravacoes();            // cache local — imediata
render();
carregarGravacoesDoServidor(); // gravações partilhadas — substitui quando disponível
carregarSessaoDoServidor();    // sessão partilhada — ativa "Entrar sem carregar ficheiros" em qualquer PC
inicializarAjustes();          // parâmetros e edições partilhados — aplica o mais recente (local vs servidor)
</script>
